body:
  text: 霞外詩集卷七元馬臻撰讀盛明卿藏書目嘗聞張華博羣書祕府因之得精選李邕豈為芸閣謀苦恨無書讀未徧古來志士守蓬蒿閉戸不識春風面一生汲没竟不伸思爾令人臉常靦先王大道周孔業百氏森森則墳典呉中盛氏表明卿結搆雄樓藏萬卷義方之教誠惟精研𤣥咀騷天為成須知種徳在根柢鄉里稱善非虚名想當探討潛沉㝠隱隱八窗金石聲排雲毛質匪難取翻笑白頭窮一經衰年覽勝錯驚喜不意短髮秋飄零他時經濟看公等此語當為知者聽蕉池舊業仙子神遊浩劫家閑門深掩夕陽斜尚思來鶴盤清漢不復飛章出太霞挂劒枝空懐季札草𤣥人去老侯芭誰憐池上甘蕉樹曽向春風幾度花畫青山白雲圖每見青山即解顔生平不道住山難和雲數畝無錢買投老傳來畫裏看冬菊三逕荒蕪冷未分尚留秋色在籬根盈枝香老爭霜力遶砌叢低上凍痕芳芷不禁甘委質早梅如見斷消魂又輸彭澤饒詩興雪滿南山酒一樽喜蝶謾抛心力為人忙百計難消兩鬢霜羡殺西風白蝴蝶蘧蘧栩栩學蒙莊京口逢友人居庸闗外何年别揚子江頭此日逢語罷憑君一回首雲山知隔幾多重題畫卷四首翠疊洪濛色雲凝淡沲春髙寒不可到應有採芝人風雨撼不動亭亭萬物表憶得定回時霜鐘數聲曉拳石蹲蒼煙疎篁倚寒碧仙人筆有神山鬼為辟易古色仍凝素幽人似造𤣥水窮雲起處不語看青天和袁徳平見寄韻肯來相顧散幽襟疎懶還容此重尋有道合歸髙士傳論交今見古人心江湖短景催寒事風雨孤燈入夜吟自昔吾廬山水裏幾看春色上來禽為翁子善作晴江圖故人遺我清江縣裏一疋紙白光晶熒心所好幾欲寫作晴江圖塵土昏人意不到竹風入戸忽然鏗戞琅玕聲為我胷中掃煩躁濡毫掃素遊其神乃悟周穆王時西極之化人但見重巒列嶂盤春轉碧應接來不斷滄浪之水倒影翻青春風檣沙鳥紛入眼物色明麗不可陳因思神禹功疏鑿本天意愧我一寸筆浩浩逼茫昧又疑此水通星河八月秋風揚素波君若乗槎訪牛渚為言博望成蹉跎嗚呼雲邊縱得支機石成都卜肆今日無人識水軒夏日碧窗晝寂幽意長竹隂滿地琴樽凉輕雷送雨逺不到雪白水花生晚香題呉彩鸞書韻圖仙人固多門積行如累級髙卑位既陳所入蓋不一綵鸞遇文蕭夙運契㝠適居然西山下鬻字給朝夕混俗隱𤣥秀偶被山靈識蕭爽致福地期延沖化術萬試既已除天網疎不失豈擬囂塵徒紛亂喪明質正如楊安君擧手凌白日上道誠不邪匪曰係黄赤所以跨猛虎示此出世跡歸來乎山中棲神返空碧寄籌峰林芝巖十首白盡頭顱老伴疎采芝人去意何如鳳溪春水依前緑底事年餘始得書摘得籌峰榖雨茶封題遙寄野人家石泉試火由真味水到中􅍽覺浪誇長記荷花香滿衣二三朋友共吟詩百年聚散渾如夢舊迹重尋又幾時甕頭濁酒且醺酣送謝迎繁事事難幾樹碧桃開似雪一生又得一春看淡煙疎雨滿江城怕聽村村九扈鳴傳語林花休落盡一春好句未曽成小院回廊日正長緑隂幽草自生香春風老矣猶多事時送飛花出短牆花落花開一夜風朝三草四任狙公人生未必無閒處錯恨桃源路不通市聲不到野人居滿院花隂晝睡餘偶憶新城羅給事枉將心力著讒書青鞋布襪厭趦趄肯向何門學曵裾錯為黄金換詞賦一生惆悵馬相如過雨殘紅轉碧溝夕陽偏戀水邊樓白頭慣見春來去縱聽啼鵑不解愁秋日書情水軒雨歇天影空我有斗酒誰來同秋風不知幾時到羣木盡在蟬聲中弔石田林隱君墓百年愁不盡樽酒一登臨吟事哀猿斷伊人宿草深少微淪夜壑孤子哭秋隂歸路西風裏誰能知此心浮雲浮雲世事付悠悠局促誰能笑沐猴終見是非身後定合將名利死前休化龍梭去驚陶侃挂樹瓢喧厭許由萬里夕陽天又晚一聲新雁五湖秋送屠存博之徽州路教官小時學讀書食寝失朝暝辛勤藉螢雪自謂古人並總角已識君藴秀發天性後來骨骼成覺我力不振夫子經濟才一邑著忠信于今六十載交友久彌敬詞源浩宏達氣岸激便佞靈椿森蒼標丹桂獨輝映經書選博士芹泮足沂詠新安山水佳况乃古名郡老别鄉黨情惻愴髮垂鬢晨征候鳴雞咿喔亦可聽潮平大江豁挂席風已正明年春草長書來幾時定信筆成雜言奉簡淨慈如一溪暢文溪粲雲谷三上人時與葛川陳渭叟偕為湖山之行康衢車馬喧塵埃閒門永日徧蒿萊八月殘暑埽不退萬里悵望秋風來青山盤盤入杖屨為我散盡平生懐積蘇與礧塊但覺隘九垓頽然兩詩翁班荆坐蒼苔一盃復一盃看雲興悠哉松風洒落如飛雨棹臂掀髯下山去古堤屈曲如壊城往事茫茫不知處魄驚耳熱未足論但見愁煙與飛鷺憂來仰白首南屏髙插天相逢惠休輩記得三生縁詩篇及茗椀好語相周旋一笑出門情不已握手論文樹隂裏浩歌不用懐古今蟲臂鼠肝聊復爾歸來一路夕陽明千山萬山白雲起施牧山良㑹見招不克赴分韻得何字聞道君家幽隱處名園緑水接官河桃花滿地雨初歇燕子欲雛春幾何千古文章輝麗藻百年人物聚菁莪自慚有句酬清事恨不相從為一過題秋山圖江山萬里舊曽遊閒裏收將水墨秋記得雙帆投别浦老來忘却是何州送友人之東浙淡交如水古應難松栢蒼標在嵗寒老去謾傷浮世薄病來多憶故園安終求伏道三年艾喜見桐廬七里灘心事悠悠轉無語數聲柔艣别江干冬日水軒寫望湖上冬暄鷗不來山山落日生浮埃半青半赤烏桕樹參差遮斷初陽臺雜詠四首幽芳泣露質好鳥弄春聲盡向東風裏悲歡各有情榮貴如風花安得長美好馮唐不解事却恨髮白早老翁似童稚豐歉總不知曝日聚簷下閒説小年時凉露老荷葉蓮房亦已空可憐紅蓼花搖搖受西風題聨句詩卷後有序至元甲午龔聖予鮮于伯機盛元仁訪予與王子由於紫霞小隱不值聨句而去二十年間相繼長往惟予與元仁在焉因感存殁書于卷尾嗚呼古人不復起我亦支離頭白裏憶昔三士相經過揚激風騷猶在耳鮮于詞翰中原英盛子蚤嵗蜚文聲髯龔詩畫復振古拄杖落落長庚星雄才盛事不易㑹似與百世標儀刑我家兄弟何為者氣與髙秋鬬瀟灑南北東西二十年淪落惟存盛兼馬銜哀不敢話耆舊掩卷看天淚如寫君不見此道誰復同一曲陽春和應寡山居寫興人事喧喧任奕碁青山數畝是歸期分將藥草鋤雲種買得松杉趂雨移老去故人多入夢愁來閒事總成詩芒鞋布襪身猶健十里沙堤信杖藜送大名髙北山之京江南山水久淹留又束琴書事逺遊忍負壯心銷嵗月曽將學業動公侯訴春幽鳥侵煙語迎棹飛花逐水流莫歎平生少知已故人多在鳳池頭遊葛嶺有懐有詩不敢吟吟詩恐未工有酒不敢飲飲酒多昏蒙無詩無酒情味俗眼前何以慰幽獨幽尋恰得兩三人雙撓破碎湖光緑鴉回古樹雲不開興䦨更問初陽臺只恐西山賈太傅嗔怪我輩乗船來却憶少陵詩轉好古人白骨生青苔如何不飲令心哀賈太傅安在哉西風落日飛黄埃賦雪吟屐齒痕深逕路迷閉門髙卧未朝炊句來天外渾忘冷竹折巖前竟不知蕭寺日斜羸馬去灞橋風急蹇驢遲謝家兒女空才思錯認三春柳絮時冬夜懐古金華牧羊兒海上釣鼇客伊人骨已飛曠世不可得求之匪憚逺道路有通塞况乃𤣥冬交蒼莽山水黒歸來守蓬蓽兹事且置側我生復如何浩歌山月白和雲谷粲公見寄詩韻二首疎簾閒白晝幽事每相親柳合孤山雨蛙喧兩岸春舊遊頻入夢落景獨傷神自愛吾廬好門無車馬塵志與榮名絶機將鷗鳥親滄江終負約白髮不多春吟靜驚山鬼心空守谷神徑荒猶笋蕨未覺甑生塵湖山春遊草歸偶作西月光景微斜簷尚如練攬衣昧旦起林巒淡方見景風積霧斂曙牖新禽囀塵動九衢喧爛爛流目眩遊衍惜歡悰行行信郊甸遺情席細草賞靜引華饌山水信恬和動息各恩怨雲斷舊時人梁回去年燕姿容一已晚浩蕩羣芳變豈不懐爾思狥往何由羡題宿雲圖白雲起生夕隂重重疊疊寒山深山人住處依林麓清曉開門雲滿屋老夫已製女蘿衣他日相期伴雲宿題畫龍門山桑乾嶺圖昔我經龍門晨發桑乾嶺回盤鬱青㝠驅車盡絶頂驛騎倦行役苦覺道路永引領望吳楚日入衆山暝歸來愜棲遲山水融心境寸毫寫萬里厯厯事可省理也存自然疇能搜溟涬即事白日坐成晚閉門喧寂分招提縁嶺見杜字隔湖聞樹合疑無㟁山空欲起雲鄰家晒漁網相見語殷勤偶成黼黻青黄入眼迷升沉人事理還齊曽看知北嘗論蟻不是巴西錯放麑百種時情雲擾擾一場春夢草萋萋此心肯與南風競已向蒙荘悟木雞秋日有懐黄瀑翁二首江闊人何逺言忘道屢空和詩多日懶左耳近來聾老栢繁秋鳥殘雲薄霽虹緬懐遲草作飄泊久成翁江左文章士風流悵寂寥别離書不至嵗月意難消夜氣勞燈火秋隂拂斗杓白頭仍世故吾道日蕭蕭福真觀主張貞居落成傑閣喜而賦詩樓觀澄湖濵稍稍薄林藪羽人何蹁蹮所迹蓋不偶貞居洞元化道勝百邪走一旦從天來經營入無有飛閣逈招仙虚牖寒垂斗旭日山獻酬翳翳煙侵柳緬懐咸平士載憶元祐守常恐金門歩未遂泉石久羣情慕飲徳伊余就白首即事不能忘結念千載後嗣師呉真人同李相黒谷觀水逺寄詩篇就韻奉和遙瞻紫氣五雲邊立雪曽容馬自然道合迴風聨斗極心㝠秋水入詩篇思蓴每動東歸興報國常期大有年安得仙人飡玉法為師鋤月向藍田再用前韻述懐春風疋馬御河邊舊迹重懐一惘然入覲每趍黄道路思親曽賦白雲篇差池燕雁三千里奄忽星霜十五年不信等閒身便老子真谷口未求田喜徐芝石得子出處慎所懐山林饒暇日多君宦游意彌年阻良覿夙昔揚清芬皎皎萊妻逸徐卿得佳兒豈負懸矢射含和玉不如勝貯金百鎰須知濟世才本自書種出于公門髙大兹事由善積積善既有報孝感聽懐橘緬思陶元亮有子但梨栗失喜成詩章誰能事聲律秋日竹院竹院茶煙暝風簷燕壘虚移樽攀野逸打果信鄰居散木參差落寒花取次疎肯言貧未已爛熳食秋蔬九日今日重陽酒西風野老家山雲膠白晝籬菊散黄花醉倚過眉杖歸隨接翅鴉賦詩酬令節幽思極無涯送浙東帥幕韓聰甫請老歸汴梁白陽舊業因題畫卷二首笑抛公府簿書忙坐石看春兩鬢霜不但昔人還手板祁奚應喜得賢郎東風汴水布帆飛舊業歸來計未遲只有白陽山色好青青渾似别家時經石田林隱君墓物色滋華風微和襲春服朋簪盍諧好容與南山麓嗟彼卧松人營魄抱其獨既秉漢隂志詎起終南禄形影一淪化疇云繼前躅沈沈正音逝徂輝難久燭搴芳託所意竟日不盈掬雨餘山更青文脈爛膏沐停雲散馳颷戢羽念深木返軫靡遑寧展轉達明旭暇日偕劉悦心仇山村白湛淵諸詩老訪西湖北山淨空主人玉公清話草歸分韻得來字松栢山門晝不開秋隂散䇿此徘徊每懐白傅題詩去更憶揚雄問字來盡日酒杯隨晚菊千年人事疊蒼苔池中金鯽疑龍在歸路殘雲帶雨回題淵明和靖畫像干禄本為酒身退名益著那因五斗米便作折腰具東籬菊花開掉頭不肯住如何千載下却被丹青汙處士徴不起孤山重顔色寸禄既不沾童鶴亦自得野風吹青春梅花萬古白惟有雲間月可以照心魄述懐和東淇王髙士詩韻二首一徑蒼苔盡掩扉緇塵難染薜蘿衣欠詩了債人多笑無酒治聾燕又歸細草幽花春醖藉逺山平野樹因依東風不化頭顱雪牢落江湖萬事違竹床支穩晝眠醒卧讀離騷懶正巾壁記西山栽樹日蝶隨深巷賣花人太平簫鼓青春好零落交朋白社貧老眼無端厭塵事又看桃李一番新為一溪如上人賦所收窑爐春城閒買得埏埴自官窑雅與梅兄對清宜柏子燒心空凝祕色質古足髙標若擬博山並博山應意消題許道寧畫軸畫師天與力落筆貴宏壯神巧刻虚無衆色為彫喪嘗聞許道寧氣逼韋偃行君家見兹圖激我泉石况午光翻素壁錯愕引遐望㝠㝠霧靄霽水木散清曠逺近層岡來造設不可状初如擁陣馬忽覺轉疊浪秋髙㟁容瘦迴風進歸榜山陽最竒秀安得數椽傍終然記華顛蕭蕭擺塵坱因思造化理詩成一惆悵和嗣師真人詩韻物和疵癘已能消酇邑封侯合是蕭屢著錦衣榮夀櫟尚懐樽酒慰全椒秋風江漢歌遺老教雨林泉沐散樵莫向明時便思隱小山叢桂恐難招題畫海南入貢天馬圖傳驛每餵粱肉余吾天馬生水中毛如澄墨耳插筒雄姿挺挺浴海氣一刷萬里追遺風九夷入貢賔來服畫出猶能駭人目韓子休教喂地黄太僕能令飽粱肉誰憐東郊瘦馬硉兀如堵牆汗血力盡徳不揚尚望明年春草長送仇伯夀之淳安教諭蚤年名字動鄉閭細數鄉閭總不如已肅師模先孝悌更承家學贍詩書桐江水逺輕帆疾芹泮春香仕路初好展長材規後學佇看他日際公車憶昔憶昔癡小時學語音未似鴉鴉與栗栗啼笑本無自長大教讀書早覺意不肆只今踰六十僅識數行字肝膽古今雜好惡出芒刺况乃衣食驅頗受塵埃漬居然無所成荏苒日月駛不如癡小時孩孩無一事人生非金石河清復誰俟和孫康侯見寄韻二首不羡青山可結茅閒居城市似江郊百年草草人空老三徑荒荒菊自苞露下天髙驚瘦鶴燈昏窟冷笑癡猫胸中萬事消磨盡只有詩情未易抛閒栽藥本旋誅茅自分詩飢學孟郊荷葉晚風吹老氣桂花凉雨拆輕苞癡兒已活能鳴雁黠鼠休欺不捕猫却笑詞人多漫興一生心力為誰抛寒食日密竹疎簾春晝閒疾風甚雨滿江南又逢寒食一百五不覺行年六十三楚女腰肢從妙舞晉人標格秪清談不勞燕子終朝語冷煖時情我自諳話舊偶成夢裏繁華憶壮時綺羅歌管競春遲如今耆舊猶能説更數千年誰得知和友人春日詩韻徐徐杖䇿到西林柳合湖煙滿路隂流水不回雙鬢改故人何在一鶯吟弄晴雲影時明晦過雨山光自淺深多少春風舊遊事轉頭陳迹竟難尋題畫山水連山轉迴谿衆木參差列上有不動雲練練積蒼雪寫此清曠心浩蕩入寥泬所以㝠栖士終身慕髙潔冬日閑思山水蒼寒雪已晴擁爐兀兀坐忘形西窗日轉梅花影趂暖閑書相鶴經三教名流小集葛嶺招賢梵宇奉餞雙徑丈席晦機翁回江右舊業人生一世間疾若交行船相語未及聞去迹不可還感兹聚散理道在心所便我昔隨我翁締此翰墨縁巖嚴慧日峰杖屨時牽聨愴惻念舊雨轉首四十年荆榛塞古道隱几甘沈綿犧樽被青黄伊誰使之然吹萬本一竅久矣齊䕫蚿兹晨集羣彦餞逺清觴傳北風吹袈裟别意悽華巔林林山根樹淡淡川上煙扶藜慘不樂目斷東南天尚想向匡廬為我容三椽萬事擲天外飽聽松風眠讀秦紀六國爭雄事已空南遊勒石紀成功早知三月咸陽火不買魚燈照夜宫偶集招賢梵宇奉簡明碧主人併呈演福湛堂講主西湖之西北山麓林泉勝處多佛屋招賢一刹丹井西樓殿崢嶸峙坤軸逺山坡陀儼趍向近山宛轉紛相屬大開象教走檀施天意㢮張無不足羣公一㑹豈易取使我平生散煩促忽憶廬山逺法師白社當年締陶陸明碧主人好事者風流千載今能續我行山下成白頭岐路﨑嶇幾翻覆童童孤山正相對獨鶴不歸煙草緑只今畫舫日遊衍酒肉笙歌自成俗百年萬事焉敢料吁嗟此輩空碌碌杖藜徒歩且歸休他日吟詩寫修竹南真宜休齋清㑹竟日偶呈瀑翁主人萬族何芸芸細大趍所託動靜不一理山林異城郭髙齋表宜休幽素滅丹艧主人有餘靜孤坐守沖漠幸與君子俱清樽稍酬酢發語各深詣頗覺被禪縛既得寰中趣稔此方外樂出門松杉暗掉臂寒景落何如杜陵翁有志但廬霍送友人之闕税使眼冷江山長嵗晏風雪集嚴凝不可當如何逺行役借問此何之之官非所適一市必立平繩繩謹三尺嘗聞昔人言厚薄見損益載歌魚麗詩商賈豐貿易堂上坐慈親閨中處良匹歸來信多娯兒嬌未離膝鬱鬱凌雲松本自手中植此道詎幽逺君子有終吉霞外詩集卷七
