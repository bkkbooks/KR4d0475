body:
  text: 霞外詩集卷八元馬臻撰春晚偶成名利塵邊隱几翁繁華慣識此心空湖光山色元無恙世事人情底不同隔岸蛙喧梅子雨映階簾捲楝花風瞢騰睡起吟詩懶讀得南華一卷終集句題山村圖二首先生髙興似樵漁更有何人在此居茅屋數間窗窈窕睡時山雨溼圖書萬疊青山但一川一村桑柘一村煙隔林髣佛聞機杼猶記騎驢掠社錢嗟餘春春雨足春水滿岸花匼匝光風暖人間杜宇最知機啼得血流春不管迷芳著物苦忘歸直待楊花似雪飛多少好懷成别恨餘香沁入野薔薇舊宫姥自别長門五十春白頭往事尚分明間邊偶説開爐宴數得供來泛索名送范起之赴海鹽州判分韻得一字喬木留髙隂多君富儒術分符佐海郡不減江左逸眷兹鄉黨彥餞祖賔筵秩此邦足魚鹽利自氓庶出願言問凋瘵惠化均所恤萬物適生意兹理在得一維時青春深鳥語桑間日懷君鬱素抱返軫守蓬蓽儻寄雲中書飛鴻及秋律幽居遣興徑穿花竹杖藜輕疊石分流趣漸成卜築每嫌山有姓避時長羡草無名去官彭澤懷元亮撾鼓漁陽愧正平不是不才明主棄野心元自懶逢迎夏日聞鶯參天夏木午隂清為引新雛斷續鳴不似翠芳園裏聽惹愁和恨一聲聲題溪山訪友圖溪風吹長松石路秋影薄下有尋幽人支笻注林壑良朋眇何許雜樹森草閣畫師發深機筆底氣參錯我昔事扁舟頗識山水樂于今日月駛此景亦蕭索愧乏買山資老負宿昔諾展卷令人嗟髙歌激寥廓贈句曲山李方外髙士有序雪巘先師嚮與茅阜玉海宗師蔣君以斯道相與締泉石之盟厥後代代繼承而雲蘿之書往來無間先師嘗手題緘書云俟玉海蔣宗師直下髙人至授之余亦為之珍襲然莫測其微意仙山雲深此道絶響幾四十年矣延祐丙辰仲冬既望貞居張髙士以句曲髙人李方外道義根心懷人千里扁舟東下因造吾廬風雪打窗清話終日偶及宗壇厯代列仙書問方外取而莊誦惟加敬羡余因矍然而起日我翁昔日手緘之書有所待乎遂敬授之方外炷香啓祕乃數詩藁因見昔人扣擊義意一念萬古列仙有知當點首于洪濛之表就賦律詩一首餞行遼海千年鶴華陽萬古春書題誠有待嵗晚得斯人五世金蘭契羣公翰墨新舊山松石在為我話前因和王東淇病中見寄詩韻裘馬遺髙志山林喜若人誼深元有道吟苦不無神躑躅猶芳意鸝鶊只草春近聞親藥褁疏豁任吾真集句題張玉田畫水仙賞月吟風不要論曵裾何處覔王門誰人得似張公子粉蝶如知合斷魂挽雪房孫髙士二首飛書昔日下彤庭自帶孤琴趂鶴翎萬里冰霜頭盡白一生湖海眼誰青才尋舊業盟松菊豈料斯文失典刑弔罷出門還慟哭看雲不見少微星帔月簪星七十翁結交真似古人風曵裾每憶升平舊對酒常疑夢寐同字好謾堪傳法帖病危猶得寄詩筒承家令子收文藁終古乾坤有至公為石室瑛上人題松陵圖左右江湖送客船分明往事十年前三髙祠下秋風起貌得詩愁畫裏傳讀史偶作間讀遺編入夜深是非人事一傷心五絃已矣廣陵散三士嗟來梁父吟酒味豈應移厚薄書郵還得信浮沉平生羡殺青山色不逐浮雲變古今冬意赤葉楓林冬意深葛公嶺下晚沉沉冰霜不改蒼松操日月長懸古木心桑落酒醒添感慨初陽臺近憶登臨疏慵無補升平世自點寒燈續夜吟挽瀑翁黃尊師窮隂逼草景始候新陽舒開嵗倐人日復值寒雨餘駕言接親朋步屐還踟蹰晨興驚扣門乃云哲人徂伊余篤雅好心邇迹自疏匪搆囂塵談所詣皆詩書時哉重三歎鑿枘方圓殊一朝忽長逝吾道將焉如緬懷宜休齋觴詠存怡愈揆景一今古豈不念厥初酸風切人腸有淚如楊朱廬山舊時雲魂歸今有無悠悠江中水青青水中蒲此别異生死何言不欷歔蒼天乎蒼天後來誰起豫挽會稽喻千巖安道亡來隔幾塵羡君終作隱淪身故園松菊燈前夢白髮衣冠席上珍兩地月明寒浪積千巖木落草愁新誰憐矍鑠西湖叟嵗晚江空弔逺人暝色暝色下千里倚闌勞此心歸鴉數不盡殘日看來沉岸靜依漁火村寒急夜砧年光與流水汨汨向人深開元宫鶴雛玄圃春深瑞氣凝松風養得羽毛成開籠已覺逢人避趂食還能向母鳴待舉霜翎天路直偶遺瓊蘂露華清為言他日隨泥詔緱嶺飛仙在玉京贈山友諸峰生草色燈火靜相依老屋藤蘿滿詩家眷屬稀風香傳藥竈露冷葺荷衣明日城中去思君詠式微讀天台洪耕道詩集二首君詩如古人格律逈孤清極力不易到艱難中混成秋聲間過水月色靜臨城夢想天台路何因慰此情詩名知已久老大不相逢雅道無人識至公終見容江深涵萬象雲盡出孤峰吟斷秋燈暗寒城聞曙鐘和仇村翁九日招飲詩韻每愛淵明詩珠璣光可摘君家枉新語粲粲壓元白有若探滄海驪龍此窟宅今嵗菊花開不受風雨迫念兹展良會觴詠忘主客百年幾何時況復難滿百緬想龍山人西風墮巾幘贈節婦一從慟哭失良人便撫孤兒誓此身不為困窮移素節自勤機杼給青春柏舟義大詩仍古竹帛名香史又新今日賢郎何以報好將忠孝答君親和灤都秋日詩韻古道經年雪髙秋萬里風遊鯤隨巨海斥鷃樂飛蓬天地皇居壯華夷聖化同吾宗貴清靜教在不言中廣微天師墨竹天人體道天機深書畫時傳道之迹葛陂龍去秋荒荒留得煙梢凝寒碧延祐丁已夏偶成七言二韻詩十首奉寄雲門斷江長老聊述近況就敘别懷雲門寺裏斷江老向來逺寄十首詩我欲報之無好句到今夢想成差池憶昨讀詩五六輩小集淨慈西隱樓鶯聲終日繞喬木南屏正在屋山頭晦機八十似古佛胸中盎盎浮陽春仰山極力負之去今也湖上無其人我家瀑翁廬山秀文行綽綽堪吾宗一住南真向十載不意嵗晚凋孤松錢唐耆舊不可數譬彼長風吹斷雲賴有白頭仇博士斯文一脈張吾軍匪石司業鄉黨敬有似荆玉楊文章新除待制翰林院此别動是三年強開元宫中鄧蓀壁身居職守心虛無近來世事不入意要鑿混沌求玄珠玄洲髙士張伯熙妙年藻思長於詩孤清不受俗物纍掉臂看雲也大竒幽居背郭人事少況乃竹户濵湖開相望淨慈隔一水蒙堂髙僧時往來斷江放下鈍斧柄杯視江湖雙眼空如今宴坐白雲裏千巖萬壑生秋風廣微天師大真人仙遊詩憶侍飛轅謁紫宸教宏正一體慈仁真仙品極陶冠褐印劒光寒懾鬼神心契重玄丹亦化手書遺訓墨猶新又騎箕尾何方去龍虎山凝萬古春湖樓夜坐孤樓侵樹小老雁入雲迷月暗水光白夜深鄰語低鐘聲傳下竺梅信失西溪偶憶曽遊寺塵昏壁上題除夜憶昔元正少壯日斑衣鼓舞樂時和逢迎衮衮嵗月老今古悠悠興廢多舊俗猶存柏葉酒新詞還聽竹枝歌強裁詩句供春帖勝裏金花奈爾何挽瑞石許山長幾回言别竟差池聞訃令人信又疑老大猶為曵裾客孤髙渾似出家兒篇章舊藁刪才定鄉里同年説更悲一樹紫荆花半落可堪吟斷鶺鴒詩山寺細泉分石路寺古占山坳暗壁蒙蟲網枯松集鷺巢塔髙鈴語切峰逺燒痕交安得遺塵事雲邊小結茅村中社日即事春酒醺酣割肉歸數家茅屋住村西恢諧謾想東方朔牧養誰同百里奚廟古神旗標麥隴風輕疊鼓過桃蹊升平景物詩難寫又聽桑間戴勝啼集句和陳渭叟見寄詩韻五首幾處酒旗山影下為君沽酒若為情平生不解藏人善一夜船中語到明寒食離家麥熟還不應空老道途間會須伐竹開荒徑剩著溪南幾尺山池邊月影間婆娑卧聽行雲一曲歌間憶昔年為客處囊中無物只詩多湖水入籬山繞舍紅蕖全謝鏡心香當年不得盡一醉沉李浮瓜氷雪涼撼起流鶯晚吹寒懶眠沙草愛風湍身間我欲頻來此只有東溪把釣竿浙江晚眺西興渡口江風起處處青山間白雲一幅天然古圖畫千金不羡李將軍弔月汀屠教授千山萬水新安郡頭白之官已足悲一夜謝池迷草夢三年魯頖失瓜期讀書尚憶同窗日忍淚何堪會葬時留得乾坤清氣在繞墳梅樹夜吟詩送友人之東浙物換驚殊俗鶯啼憶舊城春江常不定風絮故能輕樽蟻延離席檣烏送别情所嗟俱素髮得得向人明田父詞二首龍鍾田父住深村桑柘岡頭石路分猶領兒孫到城市句人聽讀勸農文處處叢祠鼓笛喧已占蠶麥十分添醉騎牛背歸來晚亂把山花插帽簷挽南谷杜真人仙源奕葉草樓孫道俗人人仰達尊兩地祠真輪奐美一生接物語言溫注經洞析玄元旨錫號榮霑雨露恩多少鄉鄰懷舊德紫雲關外望天根春日山行即事二首弄晴小雨潤春泥野店青簾竹徑西記得去年同客醉花邊停酒聽黃鸝行春足繭倦躋攀坐石眠雲日草還又是一年寒食節幾家兒女哭青山春日偶成六言五首半窗落月人老一夜東風燕來迢遞春歸幾度依稀夢憶三臺絶憐姑惡啼曉不分桃花笑春萬事轉頭陳迹青山於我相親兩袖水風春冷一抹山煙晚晴小檻倒披花影歸船逺送歌聲燕拂花隂繡轂人指簫聲畫樓楊柳六橋舊夢夕陽一段新愁柳傍風前學舞鶯在山邊怨春桃李自矜好景是非不屬間人題畫山水卓犖老氣吹蒼寒太古屹立天地間恰似秋風萬里至白雲飛動終南山賦得春潮送錢塘汪復心主簿滄江氣涵虛二月風濤作帶雨捲煙華連檣動林薄既復舊痕髙還向汀沙落錢塘東南盛兹邑半山郭多君時濯纓書暇問民瘼寓兹消長理聚散遣憂樂枝流無縱鱗所適惟大壑欲寄悠悠思川平已如昨春日間居雜興十首宿雨兼風釀麥秋餘寒欲斷自遲留杜鵑啼得百花盡却向緑隂深處愁野草幽花似有期蜜蜂蝴蝶滿疏籬自鑽新火過寒食續得去年春草詩亂蛙聲歇四更多山寺燈昏窣堵波枕上句成還睡熟再尋幽夢入雲蘿芳園雨歇燕泥新草滿中庭不似貧書罷倚闌心緒懶敲門多是詠詩人故人去後詩筒少春雨晴來花事空缺時不待謾教鶯燕語東風茶香庭院一枰棋柳影侵階日自移因見刺桐花滿樹等間憶得故園時緑波如染帶花流陳陳魚苗貼岸遊日草畫船歌舞歇春聲散入錦纒頭花底飛觴酒浪翻才迎春至又春殘日斜客散爐煙盡自洗窑瓶插牡丹門掩春風柳數株淡黃蝴蝶繞畦蔬鄰家雅子渾無事鬭草歸來學釣魚白頭無意作生涯旋典琴書了嵗華有底間愁消不盡曉來微雨溼楊花古碌碌詞碌碌復碌碌我所思兮在空谷空谷幽蘭獨自芳欲往從之失南北濁涇清渭不用分試聽烏啼丈人屋子雲枉著太玄經千載寥寥有誰讀何如北窗一覺睡况乃百年如轉燭不然留取三百青錢換美酒爛醉春風歌碌碌春江言别口占送子清江臯江煙黯行路鳥啼山隱春潮長人爭渡世上無别離何由髮垂素孟夏孟夏氣清曠眷然欣北林餘芳散縷縷佳木藹沈沈臨流敞南扉永日喧新禽塵務豈云料兹焉灑煩襟偶成小軸山水寄仰山長老熙晦翁南山每獨往問認西隱樓清隂藹喬木天風忽涼秋歸舟泝平湖遙見仰山月月色如德人萬古光不滅素練不盈尺寫此千里心欲知相憶不明月是知音嚴陵釣臺自整蒲輪出帝鄉客星名字也非常輕將好爵千鍾貴博得驢魚二尺強已訝錦衣榮故里更殊仙仗謁南陽富春山下雙臺逈青史芳傳萬古香賦得廬山洗墨池送陳成善記室還山疏鑿念前修一泓隨矩折千載硯雲香幾度匡山月慎勿濯素絲素絲光易滅送子惜離悰秋風動華髮題陳所翁畫墨色卧龍二首焦霧流雲意匠勞天風鱗甲動霜毫莫教流落人間世怕有當年葉子髙曽出泰山飲渭川怒風翻浪自髙眠如今四海均霖雨不用拏雲上九天自營自營荒圃翦蒿萊乞得鄰家菊本栽籬落螳螂搖露草階除蟋蟀鬬秋苔靜拈古帖臨池寫間把清樽向竹開鑑物近來知止水莫因兀者笑王駘送淨慈瑛照二上人往吳興讀藏經萬法本歸一一從何處得浮漚幻大海起滅波浪黑燦燦摩尼珠可以照羣惑上人俱妙年頴悟發英特方外信天遊匪為名言索悠悠霅川水一葦未嘗隔霜風切玄冬别我振飛䇿讀盡大藏教慎勿留一畫魚兔既入手筌蹄皆長物心天空蕩蕩觸處極樂國歸來面壁坐不讓過去佛相逢但一笑笑指山月白夢黃瀑翁忽忽逢迎事總虛夢回城柝四更初宜休齋裏窗前月曽照當年夜讀書贈筆生二首井梧分影半遮牆細細風生曉色涼間寫新詩試新筆桂花時復送天香中山老兔觸罝蹄采得霜毫健復竒當日若逢回處士題詩應不用榴皮題李安忠畫雪岸寒鴉圖北風萬里吹石裂古樹槎牙摧朽鐵羣烏啞啞如苦飢倦飛還向空林歇孤村荒寒得食逺日草沙邊啄殘雪回情訴意各有態羡殺畫師心更切我嘗記得天隨詩至今讀之長激越婦女衣襟便佞舌始得金籠日提挈老烏老烏爾身毛羽黑離離況復人間厭爾啼何不飛鳴丈人屋丈人屋頭春柳緑述懷清風窗戶竹蕭疏几席無塵足自娛囊罄未應慚北里金銷元不為西湖大荒今古漚生水萬化枯榮戶轉樞蠻觸到頭成底事輸他象罔得玄珠冬日村中即事暖釀霜晴打稻聲興來間䇿短笻吟寒鴉流水岸容靜矮屋疏籬村意深嵗稔雞豚喧野市寺昏鐘磬出疏林路傍老叟逢人喜似得熙熙太古心山中雲山中至樂塵中稀洪濛之氣凝清暉如何白雲不肯住盡日隨風天上飛須臾影滅風難追望斷孤鶴歸無期無心有心吾不知負却一段山中竒題畫雜詩十九首輕紅淺碧斕斑溼復水重山共春色憑誰喚起鄭廣文白髮相看話胸臆山吐白雲雲吐山屋木淡靜天機間洪荒古意畫圖在安得著我茅三間愛畫一生頭漫白人間誰復問營邱髙風急雨捲秋氣浩浩空光隨筆流四山莽蒼迷行路曉寒壓折槎牙樹竹屋柴門晝不開疑是袁安讀書處岸水依痕釣艇間炊煙幾處出蘆灣西窗正是斜陽好一帶泥金抹逺山雨餘山色天然好洗盡鉛華任春老羡爾營丘水墨仙政須不用間花草江上白雲連岸起路邊山杏出籬開片帆知傍誰家宿春色還從萬里來山水蒼寒起煙霧客船繫在沙邊樹恰如昔日壯遊時揚子江頭卸帆處飄風不動江天豁何處歸舟犯空闊大哉宇宙春無私小草幽花岸邊活衆色一掃羣峰寒春凝寶汞石齒乾山腰殿閣不可辨髣佛太古玄都壇月華如水天如空蒼煙逺樹涵秋容筆頭墨盡意不盡參錯雲山三四重數點寒鴉水繞村幾家茅屋掩柴門白頭溪叟歸來晚自把漁舟繫柳根曉晴江浦生秋水林麓青黃差可喜詩情畫意欲相髙一抹沙堤三十里輕雲漠漠天影空江村雨過生微風似嫌野外春淡薄故點桃花深淺紅北風眼冷搖林莽興盡歸來數聲櫓無人領此一段竒却向青樓醉歌舞白雲遮斷重重樹路轉峰回入雲去多應只是鹿門山不見龎公住何處春隂淡蕩歸帆急疊嶂層巒凝空碧知是夜來風雨深村外野橋低二尺平生每厭囂塵喧羡爾扁舟獨垂釣森森衆木水風涼應有新蟬慰斜照採菱渡頭秋日晚孤樓隔岸知誰家參差逺樹雜雲氣滅沒漁舟侵浪花題青松白鶴圖二首道人手中五色筆青山拂起秋雲飛秋雲飛去青山在白鶴一雙來翠微萬里天風下玉京瑤池宴罷碧桃春歸來城郭還依舊只有青松是故人送江西熊履善茂才之金陵五首洪崖嶺上白雲飛底事君歸未有期慈母手中針線迹征衫不似出門時君向秦淮我在吳柴門白髮老西湖書來莫附洪喬便只道經年一字無寒煙蔓草正淒迷虎踞龍蟠舊入詩若問六朝舊日事石頭城下月明知武林新酒緑於染不及熊郎别意濃正是江南佳麗地到時春滿積金峰寥寥古道轉堪憐懶讀殘書入晝眠眼底交朋星散盡一秋幾作送行篇霞外詩集卷八
