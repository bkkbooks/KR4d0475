body:
  text: 霞外詩集卷二元馬臻撰前結交行古交山上松青青色不改縱有霜雪侵節操固常在今交陌上花容貌相矜誇一朝風雨至飄泊隨泥沙陳雷管鮑世不有一貧一富難長久對面相看仰泰山下視羣峰皆培塿嗟來乎嗟來乎床頭黃金不可無君看金盡失顔色壯士灰心不丈夫後結交行古交皆結心其義能斷金今交皆結金倐忽能變心取舍既殊軌反掌生陸沉正平一朝忤黃祖有若將身投猛虎子桑莫逆忘其生乃能相與無相與古人今人皆足悲百年憂樂須臾期男兒節義死不變誰肻心懷未濟時嗚呼誰肻心懷未濟時釋愁去者不可追未來難強名二氣運昏曉萬物遂生成泰山若為重鴻毛若為輕苟不任天命百慮徒營營杞人一何愚無事憂天傾山平水逺圖乾坤浩浩目力短山水帖帖空光連人家半在溪影裏萬里春風來客船聞早鴈初鴻有餘音老眼無逺光登樓望不極但見天青蒼朝飛秋日短草宿秋水長不知從此去早晚到衡陽衡陽有故人書札不可將木末避矰繳雲邊足鷹揚中途多苦辛羽翮能無傷望爾三春歸依舊經吳鄉送陳子振歸姑蘇有序豫與子振識面屢閲嵗矣一聚一散不復情親偶辱見寄壯遊諸詩觀其辭追躅風雅逺邁前人不覺快然會心夫何鴈蕩片雲恨論交之不早繇是酬酢唱和無日而虛未幾又復言還嗟流景之易遷况良遇之不偶臨岐把袂故作詩以餞之平生每多湖海交論心屈指不可數男兒勳業無所成忽忽身年四十五日日欠詩如欠債冥搜豈憚物役苦晚嵗始得鮑叔親一語當機合前古怡然示我壯遊篇長歌短歌逼杜甫凝神注意一展誦山鬼水怪亦起舞夜風索索湖水驚蟄龍銜珠不敢吐羡君傑立懷長才富貴終當拾芥取胡為掉頭不肻住束書又向何方去君往姑蘇我在杭後會焉能定相許季秋鴻鴈盡南征江漢茫茫足風雨君若他時過環堵為君門前掃落花呼童厨中具雞黍君今别去相憶不冬夜客至故人終嵗别寒夜此留連雪暗天窗月風回地竈煙鴈羣侵夜發漏點隔城傳話舊成愁絶相看復草年嵗夜自遣坐見年殘竹爆中更將杯酒祝東風道人心事如灰久辜負燈花一穗紅德清夜泊逺色變昏晦卸帆依淺沙浪搜盤岸木風逆赴巢鴉細草官塘直長煙野日斜寒機聞夜織燈火是誰家四聖觀寫望西林橋畔畫船開一片簫韶水上來多少緑楊遮不住天風吹過小蓬萊挽月湖陸尊師浮雲無定迹倐忽變其常四序相馳逐安得人久長先生負盛才早嵗道彌昌我翁亦年壯瓢笠行相將煙霞結幽志矻矻窮老莊先生彈素琴一詠復一觴山川半杖屨逸氣橫天章醉袖拂萬象談笑輕侯王息肩城邑改兩鬢各已蒼我翁徵不起抱獨如龜藏先生善兼人持危振玄綱復來主玄都香火皈遐方功成身自退出處誠所當去嵗冬風來木落千林霜我翁在白石鵬化思騰翔慟哭挽靈櫬歸瘞湖山陽先生來會葬灑淚陟崇岡言别幾何時載見秋草黃遺書忽墮前顧盼憂且惶死生猶夜旦此理不足傷所悲失父執澆風散靈芒哀多情不盡厯厯寫我腸我來弔詩魂再拜陳酒漿落日大江草孤舟度微茫愁猿向我啼驚浪為我揚思君望八極想像仙人房鶴唳九皋清一笑人間忙書黃西有遊塵藁後茫茫大塊噫清氣調調刁刁聲各異詩老得之肝膽雄吐出毫芒照天地書齋晝對百慮空忽如沆瀣澆心胸簷頭癡燕並兩足細語不敢驚春風嗚呼涪翁去世久一脈流芳到西有石床待月讀到明空山無人魑魅走擾擾擾擾行塵應接勞繇來斥鷃樂蓬蒿胸中丘壑開圖畫霞外光隂託酒醪未必漢廷疏四皓至今吳地事三髙功成便合謀身退緱嶺春風正碧桃春日言情兼懷同好漢隂抱甕久忘機一事無成只布衣萬水千山人獨去三春二月燕雙歸衰顔暗改青銅鏡舊業依前白板扉莫對落花思往事故交消息近來稀墨梅疏葩結冷光素質凝古色濡毫誰氏子巧奪真宰力展卷如有訴老兔向天泣髣佛月沉時影落參旗直夜久書燈青鴻飛楚天黑寒香忽破鼻幽意不可得悠悠感物理對此成太息我欲將贈逺真幻兩莫識長嘯臨春風春風浩無極寄越上張仲美十載萍蓬悵别離偶然一見又差池簿書官事何時了杖屨春風幾日隨俸薄不堪供鶴料才髙長是贈人詩鏡湖波暖多回鴈好寄書來亦未遲鄧牧心絶粒味道賦長句以贈榖者命之本此語足深致四體不服勤何以望卒嵗昏昏塵土喧疲役身口纍食也苟失時飢火熱五內鄧君儒者仙久牧方寸地一朝遇至人玄言啓幽祕若非種杏翁定是赤松輩教以絶火粒咀嚼太和氣外美邪魔腥八珍豈足貴虛無空中素俗物盡疣贅過我索詩章已覺神彩異丹髓碧華滋道大淡無味富家食方丈日計萬錢費庖丁技雖窮鸞刀厭瑣碎安知遺世士回斡太古意萬象一秋毫忘形日月外翻嗟鄭子真谷口躬耜耒會當謝塵氛飄舉賔軒帝送鄒混無回邵武萬里晴空一劍飛浙山尋勝阻幽期歸舟醉叱神龍護行篋笑看仙鶴隨椰子酒濃欺瘴霧木綿花發待春詩鄰家故老遙相接應問西湖話别時黑白雲落落出岫雲黑白分媸妍黑雲或成雨白雲空蔽天俗眼不見察俗意誰相憐美言傾人心中有千丈泉春日間居二首滿院春隂半掩扉杏花猶怕曉寒欺蘚痕帶露侵碁石山影分雲落硯池貧久家僮生去意社遲梁燕阻歸期詩成一餉無人説芳草連天寄與誰數峰青處敞蕭齋自斫楊枝傍水栽問字無人攜酒去消間有客抱琴來遙汀風急鷺雙起古岸日斜花亂開衮衮光隂堪一笑城頭畫角為誰哀湖邊春思西林花雨霽春氣欲飛浮船過吹簫客旗標賣酒樓暖煙鶯自在遲日蝶風流正是桑麻處支笻認舊遊子規月冷聲聲在翠微千華萬草失光輝休言催得韶華去涪萬東川春也歸遊虎丘寺野岸維行舟步此金沙地孤塔出雲杪衆木攢古意蹲虎今何之裂石浮劍氣俯仰成古今人生樂為貴所以髙歌飲聊復慰身世為方仲客作子晉吹笙扇兼賦詩寄意昔君别桑梓彼此姿年芳音書兩莫致路逺徒相望暖風吹帆三百里闔閭城裏花如綺停車來扣故人家恍然一見心驚喜問余别後今何之摩捋髭鬚已如此論文把酒還相親幽尋幾處隨芳塵荒林雜卉留餘春愁姿野氣空惱人劍池舊事惟明月大笑髙歌醉中别歸來一卧吳山雲忽地西風下庭葉思君如江水迢迢不可忘我有尺素書魚鴈不得將却憶仙人王子晉月下吹笙向緱嶺仙人去世逺鶴亦竟不來為君寫入白團扇玉冠絳裳仙風道骨灑落何竒哉恍惚聽希聲於至寂一曲人間殊可哀獨坐長松下上有凌霄開此心隨此畫逺寄姑蘇臺海棠殷紅含露卧朝寒疑是春工畫末乾底事詩人吟不穩直須燒燭夜深看詩六義關風教吟須字字安苦心雕琢易出口渾成難道合天心動篇終鬼膽寒極玄言不得休作等間看烏夜啼烏夜啼朝啼東方曰夜啼林影黑關河萬里天雨霜月冷夜長眠不得烏夜啼憐爾巢中黃口時哺腥吞腐羽毛長母子日日長追隨一旦離羣自成偶相呼相喚期相守故雄零落不復知留得孤雌住衰柳柳條蕭颯難棲身夢驚三月楊花春載飛載止情莫伸欲去不去愁殺人不知挾彈誰家子暴物傷生苦如此哀音散入江湖間老屋破窗燈欲死烏夜啼君豈知送陳鍊師遊方文章金玉有定價未測碧海青珊瑚浣花老翁久冥漠種桃道士誰招呼髙風健鶻固有待舊水窮魚非自圖千里之行始足下道也不可離須臾清明書懷疏懶無堪見物情自裁詩句了清明間庭芳草年年緑不為東風管送迎春遊園草浮青入杖藜莫教孤負好花時人生屈指頭如雪消得春風幾首詩送梁中砥歸句曲山家住華陽第幾峰又將芩劍去匆匆地浮雲氣連山白露浴丹光入夜紅千里音塵隨斷鴈百年聚散類飛蓬吳頭楚尾關春恨盡在鶯聲柳色中懷古媧皇補天闕后土遂咸寧化化者不化是為元化精先王官天下其政以結繩戰國事爭討四海森甲兵仲尼既去魯老𣆀西出秦後世滋華偽機巧易其誠愚智互吞吐得失紛相仍邇來百千年一一垂空名白骨填恨土大風吹不平我生宇宙間短羽飛秋螢進寸而退尺聖人戒其盈披衣起中夕念此傷心情素月行廣漢明星流太清但覺晝夜轉不知人世更默坐觀天運萬壑回秋聲送楊古性之淮海山長嘉陵山水佳人物亦超邁楊君早讀書功名等拾芥仙山碁散桑海遷忽然邂逅西湖邊天綱宏大四海一聖君宵旰憂黎元君今又師儒之官向京口京口足衣冠彬彬魯中叟輕裝三尺桐孤舟一樽酒相送各無言蟬聲在髙柳知君此去佳政多羣才詩禮相研磨西風昨夜發廣野北固江頭吹白波吹白波為君吟别奈秋何賣藥翁山人本在山中住偶向城中賣藥去不道石潭龍出雲失却朝來下山處題元暉小景幾點歸鴉入草煙漁簑和雨釣江天誰憐一片淋漓墨曽在米家書畫船遊仙詞上清真人玉華仙夜䇿鸞輅凌珠煙罡風廣漠露華冷搖蕩金鈴聞半天路逢仙姥騎白鹿侍女雙雙散香玉遙看三島點神波恨入秋眉鏡中緑我自無為神自凝萬竅不動心冥冥靈君期我謁太帝下視濁海魚龍腥玉虛煒煜明玄景羽葆搖搖入空影一曲雲和奏未終月輪已到崑崙頂楊花品題曽入百花名長恨濛濛畫不成灞岸雨餘粘穗溼章臺風暖撲人輕緩隨流水知無力間度髙樓似有情想得山齋清影裏亂和蛛網惹柴荆毗陵客思吾道已如此夜長眠不成雅歌傷白苧儒術誤青萍逺漏斷復續殘燈滅又明身前身後事都上十年情沙丘懷古憑髙懷古重依依秦駐山頭正落暉遼鶴信沉徐福去鮑魚風起祖龍歸固知倚伏存天道肻信強梁即禍機雲海微茫波浪惡一雙沙鳥傍船飛放懷出入韻早悟身為纍終期靜結廬一間天不與半老地猶無籬菊陶彭澤畦蔬阮隱居誰能事拘束曵尾自泥途蝶曽隨秦女踏青陽幾被鶯捎出建章芳草夢寒迷碧色杏花雨細宿紅香粉凝薄翅春無力恨入修眉晚斷腸寄語莫尋歌舞處五侯門第有髙墻悼似山郭髙士髙士之師王頤山乙亥嵗浩歌終隱莫知所之故築亭曰待鶴執手東風酒一巵武林曽有贈行詩迢迢夢想江湖濶杳杳音塵嵗月遲待鶴不來空感恨乘風歸去自堪悲綸巾羽扇松隂下猶記研朱點易時嘆落花芳花麗白日脈脈如凝愁朝承清露滋草逐長河流含和憶兒時轉眼成白頭欲見西王母披心訴其繇鶴從九天來聲落江湖秋濁骨如朽鐵安得從之遊紛紛紛紛寵辱暗消磨汶上曽聞嘆逝波利欲根心公論少是非私已嫉言多神傷涸轍魚相煦眼見權門雀可羅擬住南山餐白石不須扣角向人歌讀五代史五十年間遞吐吞龍爭虎鬬一消魂不如野老深山塜留得蒸嘗七世孫信筆賦雜言招葛元白湖邊春事空城裏渾未覺幽人嗒然卧強半不離藥有時自吟哦無事亦斟酌猶異爭馳名利場百年勝負棊一著寒食清明去已逺可憐局促間兩腳君不見成都杜陵老草堂破壞形枯稿典衣沽酒曲江頭蹇驢蹩􅍷尋花草青天白日眼不開俗子紛紛猶絶倒君早來君早來須判幾緉青芒鞋好詩好酒消幾許忍使辜負繁花開振衣抖擻康衢埃莫教鷗鷺相驚猜與君靜看舟中醉客齊撫掌疾呼大呌舞三臺來不來幾字回初夏日下簾櫳午晝時黃庭讀罷篆煙遲虛齋靜極心無事卧看階前樹影移山行書所見風吹桃李已成塵澗底幽花自晚春野廟蕭條門半掩樵夫折得獻山神睡起紅葵繞砌竹風涼睡起呼童上午香一帶粉牆平似紙間研水墨畫瀟湘宿石公房和韻久憶南山寺春深始一行石靈將瀑冷僧好似詩清古壁蒲萄畫空林杜宇聲喚回湖海夢身世白鷗輕王昭君圖窈窕佳人絶代無一辭漢殿盡嗟吁丹青若恨毛延夀勾踐何功得破吳寄友人識君憐不早况復枉佳篇别去才逾月思多似隔年亂田姑熟近平楚洞庭連想得門前柳清隂初有蟬題髙麗寺因上人房清淨觀竹屋翠微裏開軒獨望時法身山色見佛眼世音知琴寫僧傳譜牌懸客寄詩空塵侵不得心與白雲期首夏江南四月雨黃梅日日隂晴變百回又是一年農事急村村布榖正相催挽鄒混無將化之夕夢旌幢引回故里問道師門鬢未雕偶因遊學去家遙病深鶴骨無靈藥夢逐霓旌入古譙寒鴈隔雲書斷續孤兒扶櫬路蕭條心腸鐵石還悽愴泣把椒漿祖草潮贈隱者蕭蕭隱者屋岸蓼入籬門木落涼煙薄魚行秋水渾居人忘爾汝沙鳥自兒孫却憶前時到梅花開正繁山禽我家衡門向山開山禽住久不相猜如今移家水邊住依舊山禽時復來寄題碧淨軒萬玉搖空軒亭亭護蒼翠徑色不受染脫略花柳氣有時清風生一掃塵土翳客來淡無語盡日坐相對此是詩中禪莫作心境會秋夜眼空夜色秋滿城城樓漏鼓聞四更杓垂月轉萬山白坐看天河西北傾聞鴈知汝幾時到先令獨客聞雨昏低度屋風急亂穿雲衡嶽路猶逺吳江夜正分如何傳素札為我弔湘君卜居人間無處不風波卜得幽居向薜蘿世事即今知夢少詩情從古自哀多髙風老木山雄壯小雨枯荷水蕩摩隨分盤飱了朝草陸機休賦百年歌涼意昨日涼氣吹衣裳牽牛已花青蔓牆百年生事秋淡薄一湖古意雲飛揚齊齊急櫓投煙渡箇箇歸鴉顧夕陽各盡天公流轉意莫教懷抱謾悲傷溪橋夜泊風雨連天鴈過初暫停歸舸傍村墟忽然喚起少年思竹裏人家夜讀書送龔聖豫之姑蘇别業謁戎使君每因送别憶前時淮海名流漸漸稀獨樹草堂工部老蒼苔茅屋廣文歸三峰有約期終隱五馬推賢莫謾違若遇天隨憑寄語布袍今擬換荷衣卧疾雙肩漸聳鬢毛垂不擬秋來病不離道友相過惟論藥醫人教勸莫吟詩每違勝事因多懶偶憶兒時益自悲厯厯百年多少事卧看風裊菊花枝梅邊會飲寄葛禧巢癡雲糢糊欲釀雪湖上今朝北風正園林忽覺生意斷獨有孤根發清迥三花五蕊春已多况乃落漠被幽徑憶昔何遜在揚州月觀風臺動詩興後有孤山和靖翁留得髙名寄香影禧巢愛梅復可憐每見花開輒吟詠心胸磊落不受俗一笑樽空晚色靜巡簷動是隔嵗期人事推移苦不定同心之言臭如蘭趂我鬚眉白未盡但願明年老身健更待梅花報春信野宿野宿投村舍搴衣度石矼鄰雞喧草柵寒蟹上燈窗戍鼓凌雲擊城鐘入夜撞蕭蕭楓葉下鴈已過吳江寶鏡寶鏡存朗照夜室難為光幽蘭抱貞心不能傲嚴霜荆玉未出璞豈畏雕琢傷和氏不解事刖足徒罹殃昭昭天上日萬古鑒中腸橫山道中村舍喜留客相逢如故知槿籬垂橘柚溪艇賣鳬鷖斷港車魚早寒田穫稻遲時清民俗古野老亦言詩傷存此山號性常子天台山上何年别一住姑蘇僅十春緇衲典錢收古帖好詩憑客寄間人悟來靈徹心多懶老去維摩病漸頻真性常存元不昧隴頭石塔蘚痕新侯門侯門心不到幽事每相仍身向中年懶詩多逺客稱曉煙昏院落寒日上觚稜得句渾忘冷窗前曝硯氷野梅雕盡羣芳一樹竒傍山傍水最相宜如何慣守堅貞操不怕風霜怕笛吹日草日草登危峰下視江與湖霏霏暝色動風聲鼓天衢山川氣象大雲物自卷舒邈彼六合中海月如玄珠列宿轉天運隂陽旋六虛藝藝萬生根復歸混元初靈府一何靜廓落無所居妙極忽自哂欲言如有拘下士昧斯理白首空嗟吁冬日寫望久旱湖水落坐看山日西梅清如客對鷗冷似兒啼怕酒常先醉慵吟少著題遊心與天逺無處覔端倪寒夜有感連宵風雨苦催寒吟對青燈夜向闌生事恰如蝸負殼入頭容易轉身難除夜竹爆聲殘燈燼垂坐聽更漏隔年期喜神宜向迎須早窮鬼難驅去任遲席上已無消夜果門前惟寫立春詩老夫記得承平事間對兒曹説舊時霞外詩集卷二
