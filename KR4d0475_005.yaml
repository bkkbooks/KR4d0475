body:
  text: 霞外詩集卷五元馬臻撰述懷五十韻昔際承平久生涯足可憐過庭猶昨日騎竹想當年書劒辛勤厯輕肥少壯便浪遊春富貴醉舞月嬋娟候轉芳華歇時移斗柄偏狂歌傷德鳳再拜聽啼鵑敢議乾綱墜難支國步顛安危誰可料否泰理相連義士含孤憤謀臣誤大權少微潛在野太史泣占天不起嚴陵釣空懷范蠡船乘軒猶寵鶴治國昧烹鮮朽木終摧折微軀忍棄捐天兵威武奮皇澤至仁宣豈意波濤怗還容骨肉全萬方蘇雨露四海戢戈鋋倦鳥思喬木窮魚守故淵甑塵貧似范晝睡懶如邊逸翮淹髙翥羸驂恥後鞭夢疑隍鹿在機息海鷗眠喪亂頭顱改蕭條節序遷行將蠡測海坐待地流泉獻璞悲和泣辭金憶震賢世途從汨汨王道本平平東魯衣冠盛中原禮樂專逺塵山出沒大野轍盤旋砧響千門急蟾光幾度圓窺斑嗟隱豹顧影笑飢鸇古水縈長帶晴雲擘亂綿弓亡元在楚臺逈亦趍燕羽服陪瑤殿天厨錫綺筵域中知道大物外愧身先歸意驚張詠離居老鄭虔風行猶有待嵗晚薄言還城郭人依舊湖山景自妍艤舟臨斷港散䇿陟層巔苑廢移山鬼祠荒謁水仙壞梁殘白蟻舊物失青氊落景連村雨薰風一樹蟬野茶伸雀舌林蕨竪兒拳挂劒尋新塜懷人歎􅂒川計疏生坎壈道直受迍邅穴冷拖腸鼠槎依縮項鯿愁鴟休嚇食饞犬誤垂涎業在詩三百沽從斗十千舉觴欺大白隱几味重玄淚盡山陽笛耕無杜曲田苦吟期自放脫藁怕人傳虎變愚難測龜藏我獨然梅花開又落誰復繼殘編贈王可受天上白日苦易傾湖外青山色長好卧沙秃栁回古春劒脊菖蒲瘦如草大船十丈騰五章絲管嘈嘈故相惱誰於此理得其全人間久欠眉山老淮隂才子心好竒忽地入門喜絶倒溼雲吹雨紙上飛急觴一舉開懷抱看君學業須立成肋力慚余向枯稿靜吟不作西子妍粉白黛黑盡一掃更待秋風入杖藜與爾西山事幽討奉酬泰軒蔣明府惠詩集六義陳國風篇章著三百齊梁變浮靡雅道日崩迫大厯拯頽波雄鳴破昏惑有如赤水珠妙在心自得泰軒儒門老赤手探月窟折得芳桂枝月姊不敢惜吞香入肺腑出語固超特夜久虛室靜淡淡月光白一讀回古心再讀動精魄乃知天地間元氣運不息髙松挺節操衆卉失顔色小子愧學詩應當取其則遊淇緑園久雨今日晴芳意亦可悅前川有名園杖䇿信步屧主人雅好事髙興乃激越長源遡淇水規矩隨曲折開軒逺色至平挹山數疊酌我以金罍餐我以玉屑森爽空光流左右萬竹列凛若隱君子錯磨嵗寒節所以賢達人篤靜以修業沂詠且及時春風未鶗鴂興來輒自至興盡即言别相送過河橋青天有明月題栖碧園青山多逸士住處絶囂塵不是人間世桃花流水春晴嵐凝户牖空翠撲松筠却憶騎鯨客忘言意更真因話金陀遺編奉呈復齋嶽仙尉就敘别懷宋家王氣久凋零姦檜元來黨彗星陷得忠良寃漬骨路人空唾牧牛亭一簣功成觸禍根忠名還與此山存寺田廢盡誰能復武穆王家六代孫王孫德業是真儒楚楚衣冠六十餘漸覺令人不好武傳家惟只用詩書相逢傾蓋即相知醮罷星壇秪説詩今日河橋還愴别柳花飛雪未多時雙鶴吟寄友人依依兩白鶴嵗久住青田一鶴垂兩翅飲啄沙汀煙一鶴展長翮冥冥自沖天思之不可見獨立秋風前有時月夜羣動息孤唳一聲山水碧凝眸側頸復裴回影落空林風露溼故人獨抱經濟才淵珠炯炯光難埋江南地暖梅花開折花待君君不來梅花嵗嵗開又落空向梅邊詠雙鶴春日幽居和韻二首吟多頭已白望極與偏長人靜坐臨水蝶髙飛過牆疏簾通草色急雨減花香幾畝山田在歸耕憶汶陽間門芳草遍長日付文楸琴潤迎梅雨衣單近麥秋一春添藥債兩眼只詩愁更欲拈書賣湖邊買釣舟鷺水風吹冷逼菰蒲藕葉欹斜一半枯玉立鷺鷥渾不動滿身煙雨看西湖飲飢交友何處坐愁思西風吹客塵酒餘離岸櫓秋老倚樓人言道無知已苦吟空役神還歌三疊意慘淡别交親送鄧蓀壁回師壇紫府仙人玉練容偶隨笙鶴下天風一千餘里梅花外二十四巖江水東贈别篇章今日賦論文樽酒幾時同不知三疊琴心裏早晚誰先上道功和張伯雨見寄懷友詩韻古道向淪沒世逺懷羲軒衰梧鳳難止惡木隂易繁况兹雨露濡何以杜本根衆鳥欣所託日草爭奪喧喧卑令人瘦曠達寄琴樽士有張伯雨壯嵗髙誼敦豈無青雲交秋風過間門好古既不泯汲汲資討論幸有茅簷下冬日可負暄所以陶元亮欲辨已忘言送蔣月屋歸富春并序富春才士蔣月屋於大德癸卯冬始豫識面一語合道如平生親豫愛其學贍而不矜處和而節禮故日與青襟之徒誨而不倦凡寄豫數詩皆深入唐人之室讀之使人擊節欣歎今詩家行輩中不可多得江空嵗晚掉頭言歸則世故可知矣輒成律詩二首以罄别懷回雁春吳寄書可待相見即傾蓋生涯同苦吟時情不好古雅道少知音木落年華晚帆懸雪意深男兒無别淚此日亦沾襟論交不易得此别轉難忘模楷存前古篇章逼盛唐早梅欹嶺白寒日照江黃家近嚴陵瀨垂鈎莫謾忙至節即事并序癸酉嵗長至節效王建體偶成絶句十首豫年始二十即一時之事寓一時之意故淪落不復收今於故篋中得其舊藁青燈三復如對故人樂天云欲留年少待富貴富貴不來年少去乃知年少承平之樂誠不易逢三十餘年恍一夢寐吁豫老矣滿簪華髮投迹空林情之所來不覺涕下故録于卷末以重感慨云觀臺雲物已書黃預卜年豐喜倍常萬姓只知行樂處更無餘事可思量天街曉色瑞煙濃名紙相傳盡賀冬繡幕家家渾不捲呼盧笑語自從容間看來往坐多時雨灑香塵土溼微珠翠壓頭行不穩嬌羞兒女把人衣照席銀山處處同綺羅人坐畫堂中笙簫未動初筵秩先命歌兒勸冒風昨夜梅花已報春地瓶移插更精神酒酣纎手爭來折鸚鵡回頭不敢嗔已有紗籠照舞兒喧喧鼓􅐟自相隨誰家院落來呼喚門外天明也不知簾旌疊疊繡鮫綃遮護香風不放消却恐酒闌先睡去預教小玉問來朝新詞聽徹思徘徊侍女擎羮下筯遲紅燭有花心暗喜流蘇雙挂玉梅枝店舍喧譁徹夜開熒煌燈火映樓臺歡遊未曉不歸去早有元宵氣象來乾天行健復初陽宫線還添化日長報答升平將一念家家人靜爇爐香追别詩友送客歸來益自驚飄零又覺嵗華新瑶琴絃絶知音在紙帳燈昏得夢頻江上有家皆舊業門前無路不通津詩人漸漸東西去誰為梅花報答春贈梓山桑醫士三首上下膏肓二豎欺煙霞痼疾我難醫曽聞適口非良藥劉氏從教未得知扁鵲秦和久不聞桑君百世有神孫囊中羞澀胸中富藥劵如山總不論臨淄古有淳于意苕水今傳桑梓山已見髙名藏不得長留詩卷在人間冬日間居世事於人喜漸稀交遊惟寄隱居詩旋營暖閣延間客自斫寒蘆葺破籬心懶尚餘詩骨健年髙常被鬢毛欺悠悠此意誰知得萬里天風雁過時題節婦崔氏傳後貞婦抱節操彼蒼何降割志士懷孤忠豈謂靈均奪良人一已逝大力難回斡依依撫耄稚終作守義活姑死復厚送兒成固超達萬古如明月光彩不可掇詩罷神亦驚落日湘江闊鷺鷥羽毛疑積雪久立小溪傍只見身不動豈知心更忙眼迷寒藻色夢結白蘋香應恨魚難得遙天又夕陽村中書事四首桑條漸緑雨晴初二月風光似畫圖茅店酒香招過客籬邊懸出草葫蘆餉留兒女自喧呼指點春禽又引雛村婦相逢還笑問把蠶今嵗是三姑軋軋繅車草屋低新篁帶籜出簷齊鶯雛未省逢人避直向路傍花上啼神旗社鼓簇林煙野老村童滿路喧但得秋成官役少免教兒女賣田園宜興張公洞嵌巖竒怪復巑岏雲繞香臺奪目寒洞口無人逢果老石頭何代化靈官泥存丹竈千年迹花落清樽此日歡飲罷沈吟未歸去松隂露滴楮皮冠送陳渭叟回山居新隱問君何事遊春城黃塵不礙雙眼明碧桃開盡且歸去新宫正待山玄卿春歸曲平林靜緑生幽芳桃脂杏粉攢蜂房西樓浪客唱别恨屈巵酒暖珊瑚光百勞留春春不許愁觜喃喃如寐語翠鴉遊女捲香歸一夜花神老風雨間意落花時節雨冥冥門掩春風逺市聲生怕間人談俗事自開芳徑寄幽情團煙野竹侵霄立巢樹馴鳩傍客鳴却笑西湖鷗與鷺亂眠沙觜見船驚感懷山南山北菜花黃又做春風夢一場多少亭臺渾不見欲憑煙鳥問斜陽送王可受之京并序淮隂王可受竒才髙義志在四方一旦束書來杭故流俗罕交簞瓢自若也且夫大塊賦形所稟則異而分投膠漆者古亦鮮聞僕與可受會面稀而襟誼合遽爾云邁能亡愴然吁聚散有常徒感文通之賦出處努力當懷子美之詩輒成短章少伸别緒車既膏矣夫復何言浩浩康衢塵迢迢長安陌疊疊經天雲遙遙逺行客之子當盛年詩書滿胸臆培風搏九萬會見生羽翼翻思夙昔情對面成脈脈不是臨行不贈言自是愁多言不得天長水闊無奈何髙拍闌干衆山黑訪山家不值雲裏掩雙扉何山採蕨薇苔痕彌坐石竹色犯行衣露蝶一團宿風花四散飛靜中觀物理各自盡天機至大已酉春天師教主大真人俾豫佑聖觀虛白齋髙士謹裁七言律詩一首辭謝盤空獨鶴下仙壇紙上春風墨未乾駑馬斷無千里志鷦鷯惟羡一枝安青天蕩蕩玄恩大白髮悠悠世路難容得間身老林壑湖西山色倚樓看雜詠六言五首堤晚遊人爭渡花密流鶯亂鳴近水亭臺柳色轉山樓觀鐘聲半村半郭幽隱不羈不束間身無利無名到念有詩有酒酬春煙外幽人獨立落日正照平臺野鷺聨翩飛去山雲斷續歸來楚尾吳頭舊夢水邊山際間情一夜杏園風急等間吹老鶯聲野渡緑波芳草落日青山杜鵑多少臨岐别恨送君歸去間眠地幽地幽無客過間居種藥荒園手自鋤湖海故人何處在十年僅得兩回書聞蟬短翼含風薄似秋一聲聲帶夕陽愁年年古柳官塘路催得行人白盡頭涼夜漸喜親燈火更深獨坐時一庭涼雨歇百種草蟲悲吾道思浮海人心似奕棋昭文琴不鼓何處覔成虧晴湖晴湖闌檻外坐憶十年遊吟靜得新意人間生古愁髙煙羣木淡逺水亂山浮幾欲乘流去鄰家有釣舟為松瀑黃尊師作溪山疊翠圖平生固多愚懶墮足棄捐賴有詩畫事與物相磨研恨無鵝溪絹幽意鬱不宣秋晚形神清落筆且周旋尺素混太古象具剖闢先溪山忽重疊浩思浮雲煙樓觀金碧開衆態敷幽妍秋色挾以至髙風生樹巔羣有備一幻孰謂理不然老耳厭喧卑但覺靜所便幸遇古君子締此翰墨緣見山有真意淵明得其全九日把酒且酬重九節龍山會散幾斜曛嘲詩謾憶孫廷尉落帽今無孟府君冉冉黃花從古有寥寥清事更誰羣髙秋大笑人間世我亦天涯一片雲水軒秋眺幽軒駕平湖納納縱秋望目極心自逺頗覺脫塵坱融雲積白黑詭怪出萬狀山坳日色破川光亂流浪庭桂復憐人稍稍金粟放豈無數日好為我發清曠花落有時榮我老無日壯幼逐心境移了識死生妄委順夫如何忍使靈物喪回首送扁舟孤燈照漁唱飛霜歌飛霜悴百草芳蘭亦委柯縱欲努舊力奈此寒風何在昔結花初豈不受春多恥隨桃李場託迹空山阿四時有代謝陽豔忽已過薰蕕苦不辨一體同消磨不如牡丹根密幄相遮羅傷心復傷心傷此飛霜歌旅夜自慚身世拙客裏更關情月樹回涼影秋聲疊夜砧道能忘畏壘酒不破愁城睡薄吟魂冷西風亦屢驚寄澉川楊如山吾聞沙丘之馬黃驪牝牡世莫知九方臯去不復有天風吹我滄海邊忽地相逢釣鼇手論文託契輸心胸傾倒金樽斟緑酒登髙望逺古意多百年之樂能幾何男兒屑屑志不展秋霜滿鬢空蹉跎酒酣眼極情未畢笑指青山歌落日却憐徐福向蓬丘蒼蒼煙浪無消息明朝挂席我歸來西湖十月梅花開梅花開動詩思思君不待春雁回因之一寄平安字送徐芝石之饒陽稅使别袂分吳地之官及楚鄉還聞稅斂薄會見姓名香山晚雲侵樹江春燕語檣公餘詩思好風月屬鄱陽春日獨坐言懷昔日歡娛憶此身名園歌舞接芳辰蟄雷夜送催花雨香徑春迷鬬草人合沓樓臺形勢壯風流鶯燕語言新眼前舊物渾狼籍休怪提壺勸客頻寄題皆山樓仙人好樓居縹眇半空立吐納萬里秋回合數州碧倚檻足吟嘯四面嵐氣入下視塵土中日夜風雨急處士種茶處髣佛白雲溼何時一登臨啜茗坐終日會待飛蓬山清風生兩腋桃花淺碧繁紅又滿枝化工消息本無機豔滋曉露鶯搖落香漬春泥燕掠歸金谷園中芳草在玄都觀裏昔人非自從雲隔天台路劉阮如今夢亦稀間中書事不甘老眼坐相欺抄盡窗前近作詩因理舊書傷故友偶經間事憶前時綺羅香散春風老鼓角聲來夕照遲咫尺青山歸未得可憐辜負白雲期送張仲美之黃陂縣令夫子先流輩之官冰蘗清吟髙存雅道嵗晏識交情天路飛鳬下津亭候吏迎黃陂嘉政在汛愛入琴聲春日寄友人聞道西山春事稠一年能得幾回遊莫教桃李虛開盡凖擬百錢懸杖頭行春行春無侣自遲留汀草汀花暖更稠馬援近來成矍鑠謝安應合減風流乍驚語燕穿人屋無賴遊絲絆客舟老我光隂忽如此不判樽酒復何求無營宇宙春風起無營只閉關魚龍趍化日猿鶴戀空山去浪溶溶外飛花擾擾間人生謾多事不及嶺雲間送桐廬徐教諭詩禮名家積慶餘桐江文掾著鞭初不惟鄉里能稱善轉使兒曹愛讀書芹水春香心自得萱堂日暖喜何如却憐垂白嚴陵老萬頃煙波學釣魚題彈琴畫卷伯牙彈古調沖淡心天倪六馬猶仰秣其眹乃得窺至音存至寂未必鍾期知昭氏在不鼓然後無成虧世情世情人事兩蹉跎一夜西風掠燕窠不見襄陽于節度青山空羡白雲多雙鳳普福觀瑞芝雲朵絲金疊幾層似聞雙鳳遺瓊根潤浮玄圃煙霞氣色凝天壇雨露恩綺皓欲尋還有約槖駝雖巧未須論由來福地多祥瑞萬嵗千秋祝至尊寫意諸機忘已盡魚鳥日相親移竹喜逢雨訪人愁問津杖藜徒步弱行李索居貧未遂平生志長懷鄭子真山中重九二首忽忽九日至幽致饒山家石根去年菊復作今嵗花弱枝不自立􅀈氉相交加恐爾霜風來寒英委泥沙流日不相貸衮衮天之涯登髙豈無人所欠惟孟嘉且就菊花飲寧復空咨嗟東籬菊花開每憶陶彭澤今人非昔人此士難再得隱几盼庭柯不語心惻惻遙憐柴桑里千古南山色秋日間咏二首西湖晴雨畫圖間坐倚闌干自解顔無酒可供千日醉有錢難買一生間草衰春色來時路鶴宿秋聲起處山橫笛吹殘天又晚釣舟燈火入蘆灣湖西日落湖東隂湖邊樓觀環蓬瀛孤山雲氣出亂樹六井水流通古城土風猶祠李相國菊泉誰薦蘇端明我有新詩弔草景景昏日短難為情蟹二首最憐生沮洳畫手亦曽摹郭索趍船火爬沙出岸蘆旁行知性躁實腹任腸無張翰思歸興當年誤憶鱸慣穿籬落罅邊來名負橫行誤被猜水國霜微初上籪沙田稻熟已朝魁因傷喣沫依筠籠忍見持螯薦菊杯籍籍禮經曽載入臨風吟詠獨徘徊贈鶴泉丁處士海鶴傳書謁洞天少微星已照林泉步兵未合判長醉執戟終懷草太玄清唳一聲孤嶼外飛流千仞亂雲邊小山叢桂能招隱細把推敲問浪仙就前韻寄翁子善已斷平生不問天流年混混似原泉短檠事業拋儒素老境光隂味道玄池草又生春夢裏野梅間落草愁邊羣書讀盡成無用自課青童小學仙奉簡黃瀑翁求示病懷賦藁志士抱幽獨病懷吟楚聲聲悲多激越天地慘不明中有孤直氣叩之金石清金石無變質形器非常名是身闕不有擺落大患嬰所以南郭翁存此隱几情清商切暑勢隂陽遞相傾攢攢得失根寵辱盡若驚保守堅貞節糾結嵗草盟願君枉來章讀之平不平自適螢雪無功志已違此身堪笑復堪悲爐中化藥慵求術夢裏逢人也説詩固節謾教貧女媚背時翻學小兒癡百年傳舍終塵土多事楊朱泣路岐送恩斷江住平江天平寺雲門和尚舊家風聞道宗通説亦通佛法悟來曽徹底江流截斷合朝東指頭龍象叢林喜句裏乾坤大藏空想得禪餘詩興好鐘聲半夜月明中春雨寄興尋芳每恨出郊遲白髮看春亦自嗤待得雨晴無暇日年年説過落花時暇日偕林芝巖數詩友清遊分韻得山字地僻幽棲絶往還門聽佳客喜開關􅒀稜轉影日過午鶗鴂不鳴春滿山萬古乾坤詩卷在百年身世釣舟間玄都道士休愁思為報劉郎鬢已斑小軒晚望感懷依依城郭在耆舊盡凋殘赤水求珠易青天繫日難壯遊多入夢落景獨憑闌嵗月無情極相思煙水寒霞外詩集卷五
