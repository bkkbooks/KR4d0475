body:
  text: 霞外詩集卷四元馬臻撰大徳辛丑冬内醮禮成天師真人親奉上㫖祈雪繼沐感通謹賦七言律詩稱賀二首金殿深沉曉仗寒鼓鐘三奏列仙班祥開寳墠𤣥風洽道在清朝白日閒七御瑞光浮帝座兩宫和氣藹天顔殷勤三獻封人祝五色雲生萬嵗山又醮罷龍樓異渥新煌煌印劔嗣金真綸音錫命期三日奏牘傳誠走百神雲葉尚籠中夜月雪花已散萬方春太平有象乾坤大一片丹心拱北辰白雲歌贈友人别白雲何處來皛皛揚長空卷舒合變化倏忽周西東出岫既無心敢望成霖功遂令淪落姿飄泊隨天風我身如雲亦無據五千里外君相遇殷勤不盡别時情又把離盃送君去送君去君早歸我亦思家心力違只恐著破慈母手中衣歌白雲雲自飛久客白露變榆柳滿城砧杵催故園經嵗别游子幾時回且盡山公酒難將驛使梅秋聲不可聽永夜獨徘徊寄家書輕别西湖十里山别時慈母勸加餐可憐寄得家書去不道艱難只道安易水懐古嚴霜薄廣野天寒易水潯遊情念古昔指物傷流隂荆卿感至徳捐已重君臨饑夕風蕭蕭慷慨成悲吟依依别故里道路多嶇嶔神勇正色厲客氣難頽侵武陽斗筲器觳觫喙如瘖强秦福尚綏誰使傳鳴琴良籌竟不進匕首將何任扶光朗中愫天道幽難諶哀哉九原下空負田樊心客夜不寐偶成短句十首用渭北春天樹江東日草雲為韻丈夫慎出處功成乃身退古人夫如何八十釣清渭四時循化機萬物隨動息衆星紛熒熒天運齊拱北縞素製野服誤染京華塵舊業在何處梅花江上春男兒不得志壯心惜徂年長空起鵰鶚目送入寥天布衾生凄寒夜夜夢歸去心恐秋風深摧殘紫荆樹吟苦不成寐寒窗凝夜釭千古誰知心遥遥賈長江此身如斷蓬飄蕭隨北風錢塘一望地家住西湖東客慮千萬端長吁愁不出誰能事低眉揮盃送白日幾欲膏吾車老眼不識路弟妹今何之蕭蕭齒髮草昨日家書至慰我久離羣游子眼欲斷日日望白雲渡灤河疎疎逺雨霽草色凌天光融雲馳疾影倦客摧中腸牛車㴑黒水回折如探湯四顧何蕭條落日心徬徨豈無親與朋晤歎天一方物色可憐人悠揚動微芳題詩道逺意此意何能忘昔聞昔聞行役苦今日客殊方窗影燈岑寂雞聲夢渺茫僕奴忘禮數親友轉參商欲寄平安字天寒煙水長旅興客中白日送清樽燈下裁書眼漸昏南浦一年雲隔夢西風萬里月當門酥凝癭椀茶膏熟火慢筠籠楮被温未覺情懐殊冷落終身衣食是皇恩早春聞笛萬里南州客離家又一年春回苜蓿地笛怨鷓鴣天趂日裁烏帽㝷人賣馬韉歸心憂賦役負郭幸無田都下初春茶樓酒館照晨光京邑舟車㑹萬方驛路草生春報信御河氷散客遥装青山有夢慈親老白髮無私世事忙想得故園殘雪後梅花開遍讀書堂書龔彦釗畫舜二妃圖後伊大舜之鰥下兮玉藴櫝而藏諸堯側陋以巽位兮師錫帝而曰俞試諸難而孝恭兮惟懋嘉績降二女于溈汭兮迺嬪于虞繇治家以及區宇兮始克觀于婦道咨百辟而設居方兮胡陟南而云徂恐夙夜之弗逮兮服盛徳而靡失何昊天之不弔兮洒泣涕而漣如委重華而莫余申兮寧逐湘流之浩淼阽天命而隕厥躬兮疇能撫事而踟蹰悲湘筠以凄風雨兮膠淚漬而莫除蕩恨骨而誰為依兮空馳靈於故都昔四岳以明頑嚚昏傲兮猶烝烝而善治君今雖死而無憾兮生厥父而厥夫懐哉若人而不復見兮終混輿而罔極孰謂九京而不可作兮美彦釗之為圖爾有斯謀斯猷兮亦孔昭於永世我歌既成曷從而弔之兮望雲氣於蒼梧回南二首家在錢塘江上春京華投老獨漂零玉泉山外雪猶白金水河邊柳又青帽底流塵春冉冉花間行李髮星星分明記得經游處一路吟詩寫驛亭又回望京城在九霄西山晴暖雪纔消人行短草春容與馬拂香塵柳動摇老鶴心情終憶海浮雲富貴謾題橋尚憐歸去身强徤厯厯松風寄一瓢舟次楊村前望同舟逺不分打頭風急御河渾蹇驢無力牽船纜行到楊村日已昏江陵即事孤舟分破緑漣漪風滿蒲帆力半欹萬里客情空感慨一年春事又差池鴛鴦引子窺魚網楊柳飛花入酒巵南阮歸來渾似舊錦囊添得幾篇詩髙唐晚泊夾馬營邊晚繫舟遥看水接汴河流淡紅消盡斜陽影髙樹乳鴉生古愁渡御河用少陵日轉東方白風來北斗昏為韻御河出天津浩浩流水急質哉鼓兒船一站過三日歸心空如馳布帆風力軟曲肱倚篷窗草㟁遶船轉維舟縱晚眺草色浮春空廣野無阡陌欲往忘西東行行計故里未覺道路長緬懐燕耆舊却在天一方舟車載名利動越萬里隔詎識𤣥中言若辱乃大白聖君執大象萬方文軌同請看金臺髙英賢盡趨風沙柳如舊識沙鷗休見猜昔從東風去今逐東風來驚雷過急雨夜色如發墨夢經西津渡覺在大江北古驛燈影薄風定沙不走數問夜何其天空月在斗大塊佚我老故園松菊存湖山無變質吟詠足晨昏舟人婦眉黛攢愁鬢欲皤繫舟瓢水飯驢騾綺羅只解装歌妓看得悲歡不較多汶上芳草已碧色駐帆聊解顔柳花經汶水雲氣入梁山短褐行人老長途古木閒故園饒笋蕨喜得及春還清河舟中二首長淮渺渺接風沙桑柘岡頭四五家自古利名爭不盡潮生潮落自年華嵗旱沙田久廢鉏蕭條民屋盡桑樞生來不識繁華事菰米黄虀亦自娯歌風臺懐古西郊蛇斷此登臺千古風雲入壮懐海濶波濤吞楚越秋髙鷹隼掠江淮倚天劒化人何在揭日碑殘土半埋空恨英雄留不得咸原煙草正枯荄圯橋昔人已伴赤松遊橋下惟存漢水流一卷素書何處在數峰煙雨是邳州吕梁洪萬里長風送短篷亂流初下吕梁洪篙師㸃過鋒鋩石一片歡聲落日中泗上泗水東流逆棹遲逺看春色眼先迷㟁花影直日亭午雞在茶商船上啼維揚寫望東風吹盡馬頭塵空對今人憶古人不見劉安雲裏過雨昬二十四橋春途中寒食行装迢遞轉孤城一路閒吟緩客程潑火雨晴錫粥冷落花風暖笋輿輕感時已悟荘生夢遺俗空懐介子情只有啼鵑解人意平蕪漠漠兩三聲𤓰洲渡驛舍晚日依依照驛亭悔將年鬢逐飛塵魯連不是思浮海桀溺從來惡問津楚漢江聲千里接荆呉山色四時新詩人到處便懐古腸斷𤓰洲楊柳春楊子江寫望古渡風初急孤舟似浴鳬山形開混沌江勢拍虚無落日金焦寺長煙楚漢區乾坤盡詩景何事泣楊朱過京口自慙為客久理棹及春還醉别西津渡吟經北固山業思青笠底詩在緑隂間不及滄江上沙鷗盡日閒客懷楊柳窺煙色漸深亂花經眼又成塵半醒半醉看浮世無子無孫任此身春盡歸鴻成序少日斜行客轉頭頻中年未遂躬耕計憔悴山陽笛裏人呉中故鄉别久語言訛喜聽呉音入棹歌萬里歸來心未穩夜䦨猶夢過闗河贈顛上人越僧號顛叟逺自鑑湖來攜詩扣我門一見心顔開自説蚤行脚見佛向五臺倜儻了不羇談笑無塵埃乃知顛非顛俗眼徒見咍達士心地空明明本無猜詩成作回向此道何悠哉春風亦浩蕩飛花下蒼苔自適人心如跳丸怒風號萬竅狙公易朝草取捨本同調我心用苦拙綿綿抱獨照結廬逼湖水可以足吟嘯寵辱不復知風來水禽呌奉簡張仲美山川散淑氣灑灑揚芳塵眷言沂詠樂薄游及兹晨晨出草還歸乃聞來故人新詩發麗藻叙此平生親憶昔别故人轉燭餘十春萍蓬各異勢良覿遂無因借問今行役幾日航江津鑑湖波不改賀監誰為鄰嵗月何奄忽事往情難陳相逢且慰意庶復全其真題𤓰鼠圖女臂狸頭不自竒桑虞翦棘化偷兒飽他鼠腹能多少幸是癡猫未得知詩思本與名言絶乾坤鍾氣清靜中收拾得閒裏琢磨成美刺明時化幽微索至精不曽親悟入似隔萬重城西湖晚思日落湖水黒衆山生逺塵船回載酒客樓倚獨吟人老態多思舊時情只貴新籬邊古梅樹開謝幾年春送詩僧俊傑菴游越曽共山中聽杜鵑巾瓶還問剡溪船三生石上三更月早晚重來話極𤣥拜墓一别松楸又一年歸來拜掃一茫然老烏下竹窺盤飣稚子攀松挂紙錢心斷野花春色裏愁生杜宇夕陽邊東風不管流年事只向西湖送管絃安居午睡覺來晚倚䦨看水流柳花終日過荷葉向人浮掃地山當戸焚香書滿樓此心無愧怍吾道轉悠悠野外野外蕭條景更佳牧童將犢卧晴沙白鷗長遶分魚市紅杏深藏賣酒家倦向客程添懊惱老看春色厭紛譁田翁也學青門隱料理荒畦自種𤓰和曹梅南見寄詩韻二首毎憶仙人蔡少霞幾畨同㑹稚川家春光正好無閒日又負西園一度花閉戸誰能草太𤣥老來慵懶尚依然麻衣道者如相問休道錢郎骨未仙送仇仁近之溧陽教授我昔萬里遊轉覺山水好歸來桑梓間凝情向故老自從識君三十春交淡如水情相親愛君長才凌鮑謝和光接物同常人人生㑹晤真難據君又之官溧陽去溧陽地勝名士多道在絃歌閒適處春江漠漠春帆開柳花風起如塵埃只恐文星留不住玉堂金馬待君來待君來請看天上黄金臺哭巖翁龔處士二首平生師友最相知拄杖過眉白髮垂老大𤣥英心尚隱凄凉伯道死無兒驊騮絶筆堪成恨翰墨堆床付與誰挂席歸來還慟哭可憐不得挽靈輀耆儒行輩盡凋零每對先生憶古人亹亹笑談驚座席昂昂標格動星辰九原何憾遺編富孤女無依舊業貧今日隴頭誰誌石野花芳草一年春葛嶺言懐湖上繁華已隔塵樓臺遺址野田春蘇堤飛絮無多柳洛社工詩有幾人白石取殘山粲粲黄金銷盡水粼粼葛公丹井依然在換却西邊舊日隣和閑居韻萬物隨生化簞瓢任屢空短長荘説劒得失楚亡弓機盡心如醉言忘耳似聾已知身是幻休負百年中寄昇元陳渭叟白苧衣裳烏角巾昇元觀裏寄閒身自離别業行經嵗每得新詩説向人一室圖書朝㑹客滿山星月夜朝真可憐種杏仙翁去孤負涌金池上春墨竹墨光浮潤拂新梢尚憶清風遶鋭毫安得滿林生練實鳳巢丹穴正嗷嗷傷曹梅南忍君凄斷鼓盆歌便欲相從隱薜蘿仕路久忘貧自樂好山未買事多磨院房求寄閒家具風雨驚飛舊壁梭一曲陽春人不見隴頭消息竟如何草春風雨縈寒入草春倚䦨還動去年情淺流科斗已生脚喬木鶬鶊初有聲南畝歸耕無業在北窗髙卧喜心清樗蒲一局從兒戲已悟人間寵辱驚寄苕溪沈玉湖寶溪春晚柳花飛記得停橈送别時短髮霜侵難信藥壮心灰盡未忘詩呉山佳麗全非舊洛社風清尚有誰何日相過一樽酒西窗夜雨話襟期題姚安仁南陌㝷春圖杖藜徐歩趂晴光岸草無名亦自芳桃李不知何處問青蔬拾得已盈筐忽憶忽憶行年五十五擾擾得失枯人腸金魚緑酒我須換蒼狗白衣誰可量瘦梅喜浸古罍盎老態怕著新衣裳親朋相别萬里外一字不到三年强題鄧蓀壁所藏龔處士畫馬卷金釘繩短駐霜蹄曽見先生手畫時精凝繭香回緊爽氣隨神變發權竒華軒欲試丹青動絶筆無傳造化私今日有誰偏愛惜鄧公馬癖幾人知雪夜風急雲彤結晝隂水邊樓迥懶登臨老夫覔句愁人别稚子開門喜雪深漁火依稀明逺渡寒鴉撩亂集空林江山一片模糊白誰識孤鴻萬里心葛元白年登七袠寄詩寓意就韻以和士得佳名盡不虚曽提徤筆賦閒居經行國裏當扶杖豈向槎頭謾釣魚昔日家聲疑夢寐壮年交友盡稀踈讀書兩眼猶如月白首長懐董仲舒挽安人丘氏慣承甘㫖足優游八十慈親雪滿頭混沌鑿開真不變摩耶化去佛難留梁空落月萱堂曉香轉孤燈繐帳秋惟有隣家心緒切倚門人老正闗愁謾成暖催花雨溼行塵脈脈憑軒欲損神閒憶少年如昨日只疑樂事是前身黄鸝紫燕春仍好剰水殘山物自新可惜白鷗波浩蕩扁舟老却釣魚人永嘉包氏子孝感詩昔别風塵際驅馳三十春存亡違故里涕淚泣髙旻棄置青雲志間闗白髮親及泉悲厚地錫類有斯人就織從無婦揮金竟贖身生還休陟屺孝感實通神轉覺乾坤大難酬造化仁楠川耆舊在為爾一酸辛挽葛元白二首年登七十鬢絲垂纔别經旬病忽危死隔異途悲范式奏終流水失鍾期已無湖上重來日猶有床頭未和詩妻逸子賢人事盡難教竹杖化龍遲老來多感病孱顔不擬先生去不還酒約詩人時共飲門嫌俗客晝常闗傷心池畔新移菊瘞骨湖西舊買山牢落西風吹别淚楓林赤葉正斕斑春老言情野薔薇開花欲盡官蝦蟆呌春無多人生萬事聊復爾有句不禁芳草何偶成榖雨聲連四月初閉門甔石久無儲貧憐杜甫常賖酒老愛邊韶懶讀書鄉里小兒相爾汝簷楹乳雀自親疎生生化化皆春意誰羡簞瓢樂有餘和友人春雨詩韻物換山仍在春歸鬢亦華詩來慚馬異金盡誤劉又林色花如綺簷聲雨似麻世情忘已久投分老烟霞山行有感此聲欲發又還吞壮志消磨入瘦藤山北山南松色裏一年强半送親朋經山寺有懐故友浮雲春色眼前生萬事傷心布榖聲薊子休慙𤣥尚白屈平常愧濁難清鶯花世界經飄泊湖海襟期失老成山寺無人晚歸去詩牌忍見舊題名漁父歌老翁家住西湖邊自從學釣四十年瓦甌酒醒炊未熟白日過午常髙眠昨朝老婦丁寧泣銛鈎須利不須直得魚賣錢及早歸鄉吏打門征斂急嗚呼呉松笠澤秋水多筆床茶竈今如何傷廢塜春風習習吹花木千山萬山一齊緑日午諸村社鼓喧田家小兒徤如犢閒來徒歩上前岡纍纍古塜相攅簇荷鋤老叟向我言元是前朝貴人族貴人在時勢絶倫後擁前遮來繡轂并吞隣土孰敢嗔回山轉水開林麓相連崗幹成一丘斸斷雲根埋寳玉大書功徳紀豐碑直向山前起華屋子孫擬作千年計盡是老夫親拭目星移物換水東流泉下知誰伴幽獨翁仲雙雙賣與人留得三竿兩竿竹寒食不見紙錢飛只有啼鵑替人哭又説東家來卜地役夫日夜喧山谷天理蒼茫不可知後車須看前車覆浙江晚眺昔年呉越事并吞留得青山只斷魂落日正明漁浦渡歸鴉遙㸃范家村雲分雨脚回沙溆帆趂潮頭出海門欲問凄凉千古意鴟夷何處有兒孫閑思二首累石誅茅一徑開自移花木向陽栽春來可是多隂雨漬得棋枰上緑苔困來收起讀殘書閒坐蕭齋一事無學圃慣知花木性莫教蘭蕙雜䕷蕪西軒夕望鄭公粉繪久寂寞山水佳氣誰為傳閒雲無心底不定凍鴈失序空相憐獨留雙塔樹倒景尚憶髙堂祠昔賢寒煙蔓草亦自好未須歌鼓汙天然解嘲與奪紛譁事事虚此身天地一籧廬避名秪畏人心險存道元非世法疎甑裏塵生徒好客床頭金盡謾耽書秋聲又入窗前竹除却髙眠總不如凉夜獨吟竹風吹獨夜危坐破愁生嵗月此身老路岐何日平行雲攙月過戍鼓雜鐘鳴多少心中事苦吟吟不成天師真人畫小景卷溪煙蒙青林秋色灑天地歸舟何人斯傑閣吐茫昧洩雲展白練絶巘立蒼翠真人心虚無發頴抉元氣淋漓一尺楮回薄萬里意嘗聞郭忠恕刻畫破精粹豈若法自然淡乎似無味六丁慎呵護恐有風雷至短景短景移林影田家得暫依病牛㝷日睡枯葉帶霜飛坦蕩天公意凄凉客子衣窮通應有定未必計全非霞外詩集卷四
