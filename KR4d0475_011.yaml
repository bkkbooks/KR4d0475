body:
  text: 霞外詩集跋虛中錢塘族也少時慕陶貞白為人師碩翁著道士服隱於西湖之濱嘗畫桑乾龍門二圖流傳海內不見者輒以為恨既從禇雪巘遊肆力吟事風致酷似中州諸名家伯雨之後復有虛中何錢塘多隱君耶海虞毛晉識
