body:
  text: 霞外詩集䟦虚中錢塘族也少時慕陶貞白為人師碩翁著道士服隠於西湖之濱嘗畫桒乾龍門二圖流傳海内不見者輒以為恨既從禇雪巘游肆力吟事風致酷似中州諸名家伯雨之後復有虚中何錢塘多隠君耶海虞毛晋識
