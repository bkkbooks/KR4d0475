body:
  text: 霞外詩集别集類四元提要臣等謹按霞外詩集十卷元道士馬臻撰臻字志道號虛中錢塘人仇逺序是集稱其隱約西湖之濵士大夫慕與之交不過習清虛談淡泊無一言及勢力聲利龔開序則稱大德辛丑嗣天師張真人如燕主行內醮玄教名流並翼然景從王子繇馬志道在焉其人蓋在通介之間者也集中鋪張富貴數篇如嗣天師吳真人詩之類頗乖山林之格然所作皆神骨秀騫風力遒上琅琅有金石之音雖不能具金翅擘海香象渡河之力而亦不類酸寒細碎蟲吟草間觀其述懷一詩殆宋末遺老寄託黃冠而其豪逸俊邁之氣無所不可政不以枯寂恬淡為髙耳此本為毛晉所刻末有晉跋稱伯雨之後復有虛中今考諸家之序皆作於仁宗大德初年則臻尚在張雨前晉偶失檢也乾隆四十二年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀霞外詩集原序錢塘有隱君子曰馬虛中其資也粹其學也正其言也文其居家篤於孝弟清勤恬雅動以古人自飭暨出家著道士服隱約西湖之濵士大夫慕與之交不過習清虛談淡泊無一言及勢力聲利而世之能寒熱人者爾爾我我進退語默之間一言不少屈蓋重內而簡外信己而不求人知而人之知者誠心説服焉噫君子哉豫與虛中遊有年平昔已敬其人一日虛中攜詩卷相示大抵以平夷恬淡為體清新圓美為用陶衷于空合道于趣渾然天成不止於煙雲花草魚鳥而已鄉有雪巘褚先生者博學卓行之士也執古刀尺裁量晚後虛中從之學盡得其徼妙况汗漫萬里逺覽嵩岱之雄拔江河濟淮之奔放近挹兩峰三潭六橋之佳麗秀整交廣視濶胸次宏豁宜其筆力不凡如此昔人謂不行萬里不可讀杜詩而夔州以後殊更老成豫於虛中之歸不但放一頭且畏之矣西湖物物是詩料秋來日日是詩思尚當與子吟嘯于乾坤萬象之表大德六年九日里人仇逺序大德辛丑嗣天師張真人如燕主行內醮玄教名流並翼然景從王子繇馬志道在焉明年來歸志道出往來吟卷及手畫桑乾龍門二圖僕幸得一見隨喜居頃之遂以所作霞外諸詩俾為之序僕既嘆羡有加因之又念雪巘翁極父師之教至此而玉其成且行卷所存多禮樂光華之典據後之君子録名山故事尚於兹有考二者皆當表著而復計忖自車書混一南北通轅干名逐利者去來幾何人嘗試使之述周漢之遺迹大川喬嶽之勢狀與城郭人民之今若古或者漫不知省必待詩人采掇歸之筆下如好音嫭色動人觀聽一何異哉然後知先王之澤先民情性不逐有形而弊而事事物物見之聲文氣韻萬古可一息辨也合是為序要非窽言抑孝友德履詩之根本也志道寧親於家庭甘旨如意領弟於精廬意愛無斁交往朋從久敬弗替而於僕也又以翰墨遊戲相與無間其何説之詞為詩若干首古今體製具在而馴雅如其人覽者自見淮隂龔開聖豫序
