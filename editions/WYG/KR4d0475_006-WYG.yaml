body:
  text: 霞外詩集卷六元馬臻撰嗣師總攝呉真人奉㫖乗驛逺詣龍虎二山等處崇建金籙大齋庚戌仲夏十有四日抵杭四聖延祥觀慶成典禮復被綸音回鄱陽進二親國公夫人之秩千載盛事道俗交歡敬賦七言唐律二首言賀翩翻羽節午風微夾路人看晝錦歸丹詔紫泥傳象闕寳冠金帔勝萊衣九天飛奏通齋典三日開晴應徳機要與東呉留盛事悠悠吾道發光輝榮際三朝昔未聞暫將飛鶴下天門詞源久仰文章伯化囿今瞻道徳尊雨露松椿推極品金湯冠褐戴深恩晚香堂上薰風細藹藹歡聲入夀樽送張仲實赴姑蘇教授夫子才難數斯文道益尊調官之魯頖理棹赴呉門詩價璠璵重家聲禮節存聖朝敦養士薦美荅君恩送陳渭叟歸山中人生少至百一别動經載不信嵗月馳請看容鬢改先生本是超絶人長竿學釣清渭濵釣頭不解挂芳餌岸草汀花空復春大魚小魚求不得芒鞋忽厭人間窄手攜詩卷出萬山來覔湖邊閉闗客終朝相對百不為口中咄咄唯言詩飛花濁酒日色靜天地悠悠知者誰興盡翩然即歸去鶴巢雛在門前樹他時我亦訪君家但問青山白雲處閑居自遣喜無軒蓋欵柴荆靜裏天機見物情徳愧王良千里馬食無婁護五侯鯖海翁豈為鷗防慮稚子休烹雁不鳴一笑行藏頭已白新凉又到讀書檠舟中即事家住西湖楊柳煙歸心一片逐帆懸推篷試聽舟人語正在鴻飛阿那邊湖西分韻得西字詩成曽在酒家題記得西湖更向西洛社交游雲斷絶梨園歌舞草凄迷年華老去心猶壯世故紛來物不齊行盡長堤理歸棹槿花籬落夕陽低秋霽雨久喜新霽曠懐歌薄遊鴈經孤驛暝雲入亂山秋落葉無時下啼烏有底愁年光與心事盡逐水東流嵗􅇀偶成古人不可見養拙謝時髦隱傍淵明柳飢懐曼倩桃鑿坏誰敢望抱甕豈應逃義見馮公偉仁依范叔豪乾坤心浩浩江漢日滔滔老境誠難料繁荆未易薅親朋隨宿草嵗月捲秋濤夜短雞籌促天寒象緯髙燕情傷局促松節感持操姜被流離析鄒裾揖讓勞亂雲迷鶴路短髪問漁舠念與追攀絶心辭寵辱熬世情甘木石我輩豈蓬蒿萬事差池裏長歌對濁醪送楊仲𢎞之京迢遞官塘官樹隂征鞍催發短長亭荆吳雨漲河流白齊魯春歸岱嶽青玉宇風雲開北極金臺日月聚文星近聞下詔求賢急劉向終須論五經泊然暢學士將之太平守出示竹齋安大參見寄詩屬余和韻山樊嵗晚締梅兄恬憺相看足古情湖上舊遊經幾載吟邊心事記三生清標野鶴昻昻立髙論長河亹亹傾正是太平風景好雙旌五馬試春行祖塋春祀賦雜言平湖納衆壑兹山亭紫㝠吾祖飛舄去遺蜕扄佳城思之感節序泫然傷我情莫教緑髮愁中變百年人事山鶯囀天邊明月來古今無復延陵懸寳劒青春不作松下人年年空掃松間塵松風蕭瑟不忍聽且將美酒澆青春親朋談笑分餘胙蝴蝶不來芳草􅇀路傍遊子矜少年拍手揚眉唱歌去唱歌去入誰家請看昔日朱門今野花風光盡屬官蝦蟆籠鶴曽隨阿母宴瑶池野格昂藏不受羈側頸鸞凰那有待能言鸚鵡莫相􅅓九臯月冷歸何日三島雲深夢自期誰惜天風舊毛羽瘦梅花下立多時松鶴吟寄儒魯山寒松屈鐵骨氣聚丘壑隂老怪不適用庶脱斤斧侵東風飾草木衆色自成林似聞孤飛鶴斂翮遙相㝷鶴性負髙潔松色融古今臭味既不殊未見情先深素琴三五絃中有太古音太行本不險行人自㠌嶔願持寒松操寄此孤鶴心復恐不見信遂作松鶴吟寄葛川髙子長春風巷陌喜逢君歸計無端阻重㝷恨别不禁啼鴂晚到家應是落花深出門送客山當路隱几讀書松滿林自笑白頭城郭裏釣竿空負五湖心送黄瀑翁回龍虎福地三教名流飲餞分韻得醉字又得大字春來幾何時草色泛空翠如何百年中聚散若交臂衆賔羅髙堂把酒叙别意别意不在酒已為六經醉後㑹定何時更待秋風至幽獨一寸心閉戸學懶墮自非簷雀乳詎識青春過每懐彌明師文墨日牽課一朝動歸興我亦北窗卧逺意不可將花落風雨大臨岐叙别呉山蕭瑟呉雲隂臨岐送别還沈吟不愁聚散易反掌但恨輕薄難論心流年鼎鼎素髮短歸意拍拍青春深江中釣得一尺鯉莫惜書信來相㝷挽徐澹軒璧水衣冠舊有聲芹宫三仕已忘情承家徳業存誠敬落筆文章法老成汛愛能全饑饉活流芳還見子孫榮生芻一束人何在道悦堂前月自明屠存博偕詩友見過分韻得凉字院靜朋簪盍吟清夏日長道同忘爾汝俗薄任炎凉林木鶯雛鬬湖風藕葉香鹽車多服骥不必待王良新凉遣興山水光中屋數椽治生無術晝常眠詩成好句敲門説藥遇竒方信筆傳漸老一身休問卜未來萬事只憑天西窗昨夜西風起秋在歸鴉落照邊冬夜長寒房夜久燈如珠新霜薄薄鋪堦除擁衾敗纊不釀暖萬感鬱沒同鰥魚隣雞努力催殘漏飢鼠啁啾壁間鬬可憐心事誰得知愁殺梅花月中瘦和仇仁近嵗􅇀見寄韻瑤琴三疊此心閒目送飛鴻信手彈千里故人行自逺一聲白雪和應難賀公嵗晚稱狂客鄭老才髙只冷官且向吟邊了身世西山􅇀雨捲簾看挽清軒屠武翼槐隂舊夢不須論餘慶終歸積善門負郭無田耕化地傳家有子受皇恩并將白社肩隨盡記述清軒手澤存徳業既脩芳緒逺一經還擬教諸孫春意二首空堦重疊長莓苔春靜閑門晝未開江上故人終嵗别柳花飛盡不歸來春來藥褁不曽疎手内枯藤尚未除病起無端添懊惱壁魚蠧盡一床書春日客思天地羇情薄江山幽事稠人煙成小市風雨住行舟野色城邊斷春華水上浮歸鴻縁底急衮衮過西州挽淵徳周真人昔别西池下九霄雲龍風虎際逍遙已瞻母教推慈訓載育師真顯聖朝姑射謾傳年榖熟易遷難擬些詞招金支翠節知何處望斷秋煙凝不消送張子微赴鄱陽學正士有張子微早嵗已識面蘇杭一葦間白首復相見悤悤相見又何如云今欲度鄱陽湖鄱陽多士森琪琚先之徳行隨詩書子率以正孰不正斯文千古師嘉謨白蘋昨夜秋風起八幅蒲帆泝煙水鄉閭得士早歸來髙名已動青雲裏越上感懐二首曽負琴書到越中别來三十五秋風江山有待容回鴈嵗月無情類轉蓬禹穴荒煙寒木老鑑湖舊水野田空騎鯨人去知何在擬向沙邊問釣翁人事浮雲易變更越江如帶遶寒城千年舊夢青山在一曲髙歌白髮生馬首交情分曉渡鳩邊村意傍春耕東風嵗嵗吹芳草金粟堆前緑又萌錢清劉太守廟旌斾千年去不還一錢誰信重丘山使君有廟繇清政俗客過門合赧顔鄉社雞豚風物好嵗時簫鼓水雲間殘碑讀盡無人問日􅇀隣翁為掩闗蕭齋怕侵塵土氣種竹護蕭齋吾道似無味人生嗟有涯日光穿壊壁鴈影落閒堦衮衮百年内勞生非我懐春日陪數詩友酹磐隱墓分韻得走字杖䇿隨躋攀欣此方外友搴英陟崇岡雨滑徑未取撫事骨屢驚攢眉酹親舊蕭瑟山門風委曲瓦盆酒僕夫致笋蕨行厨竹間走人生縱騷屑金石亦銷朽具論夜旦理萬古破聾䏂初聞子規呌于今未絶口扁舟問歸途放歌出林藪窈窕松聲長憂來錯回首憶孤山自從梅樹委荒煙湖上風光不直錢見説年來春好在擬攜樽酒報啼鵑黄瀑翁逺寄佳篇就韻奉和四首去帆張别恨極浦引餘情千里故人逺尺書雙眼明乾坤隨闢闔雲物偶逢迎幾欲傳回信黄梅雨未晴飲餞鶯花日懐歸雞黍情園蒿憐仲蔚石鼎憶彌明鄉老吟詩别篙師倚楫迎秋風正相待不必問隂晴風江塵漠漠野日草離離雲隔呉山外春歸楚水湄龎公惟避俗墨子謾悲絲人事多翻覆長懐招隱詩初月照逺意向人光陸離夜華沉木杪河影薄天湄習靜存丹火謀生理釣絲思君望不極翻讀贈行詩送草池謝法師之京求賢遙捧檄浮海逺寧親豈意金門客來盟白社人聽鶯懐桂館轉鶴覲楓宸林壑生生意還歌帝力均送善之鄧學士被㫖之越書譔大禹南鎮二廟碑記遺廟稽山嵗月多負舟龍去事如何北宫視草重修記南鎮因方復共科片石文章光日月九功風化浹山河絶勝逸少誇才思只寫黄庭換白鵝雨窗懐感江湖積隂雨四月如凉秋我室空四壁風聲為颼飀短褐久已弊敗纊幸不收况兹蒲柳質賦性多謬悠不義取富貴未語顔先羞稱善在法則古有馬少游平生急難人青春卧林丘此道付寂寞有淚如泉流世議限迫阨冲和喪雕鎪鳬鶴互相笑所見竟不投泥龜樂曵尾煙水盟馴鷗棄置勿復道倀倀非我求夜吟靜吟松影裏抱膝久淹留衣透一身露心㝠萬里秋聞鐘如有省見月未能休此意應難極㝷閒不自繇寄太平使君暢學士天下英才不易得中原復見文章伯扶摇九萬始一搏大鵬不是籠中物君侯昔著宫錦袍集賢如堵看落筆花磚日過草萬言暫勞牧守皆餘力去年傾蓋西湖邊義薄層雲如古賢摩攏風景陶大白醉看俗物都茫然孤山處士呼不起梅花樹老咸平煙自從别去生幽恨心上流塵欲盈寸山重水複夢難通每辱書郵數相問采石江頭月色新一樽還酹謫仙人太平無象今有象政化已及民風淳平生得意真天真但懐後㑹殊無因霖雨八荒應爾待鳯凰池上柳條春送新城賈宰門堦閒寂晝垂簾重疊青山遶縣前政及鳴琴方百里化均馴雉已三年姓名不待公卿薦世業皆持將相權他日人來問民俗去思碑在浙江邊漢景帝紀道存恭儉接前王民自熙熙物自康已見竇嬰申漢約長星不用出光芒寄黄尊師岸花開盡木芙蓉雨意分凉到水葒比似髙眠消永日試來湖上看秋風倚樓徙倚西樓倦眼開古今人世一傷懐雲將晚雨飛平楚鴈帶秋風過兩淮可但學詩無孔鯉空聞志怪有齊諧固窮自是㝷常事蔬食聊從祭祀齋挽詠沂翁縣尉故家喬木已凄迷白髮衣冠只舊時貧樂簞瓢忘世味老將書籍課隣兒藥囊病久無方効薤露情深得句遲遺藁有傳真不愧殷勤説與九原知春遊呼童提攜老瓦盆杖藜逺逺敲柴門野芳幽草煙斷續流鴛乳燕春瀾翻山深自有古意在日靜不知人事繁花開花謝一如此身外得失誰能論呈達卿焦使君二首維摩隱几非干病病為民心病未平五馬揚揚風化首且將仁惠及蒼生道人慵懶久忘機畫㦸門深每到稀昨夜床頭虀菜老飽眠閒看白鷗飛送善之鄧學士之國子司業階州紫水進新泥喜聽除音下玉墀只合文星依帝座還於錦里得儒師揮毫作賦春雲動委珮趨朝曉漏遲想得誨人應不倦諸生館下立多時春日幽思二首閒看兒童鬬草歸三三五五自相隨老翁也趂堦前坐笑指飛蓬滿鬢垂溶溶池水夜來添一雨生寒似去年飛盡柳花無好句却移詩思在荷錢陪吟友山行分韻得山字春郊有幽致不在桃李間解后得三士緩歩隨躋攀玉泉古招提題詩憶香山信此流電身區區亦何顔一閒乃自棄造化未必慳且復理歸棹日入相與還和仲實張教授除夕詩韻春入屠蘇酒味輕燈前笑語待天明詩應神助筆初試癡任人嫌夢却清紅豆粥香分餽餉金花勝巧耐逢迎年來嵗去闗心事怕聽隣家爆竹聲挽黄松潭二首紛紛世事厭炎凉白首書林夢一場月冷夜長鸞弔影江空嵗晚鴈分行臨終覔得驚人句留别親傳教子方惆悵九原春草緑勒銘誰為發幽光悲凉舊事已難論唱和詩章滿篋存風雨市㕓多白眼妻兒燈火幾青樽玉樓有召能成賦蓬海無香為返魂處士不歸𤣥鶴去孤山梅老月明村題淨慈叢玉軒招提雄壓南屏山李侯筆底叢竹蟠風香細度白薝蔔秋影森立青琅玕瀾翻醉墨光凝鐵不受𤣥冬雪摧折室中老子心亦空白髮相看眼如月詠田横二首漢家天子詔遺臣恰是恩多慮轉深忠義自能輕一死可憐門客盡同心海日荒荒海氣凉一思前事一心傷繇來匪石終難轉不是將軍畏酈商送希真鄭尊師回新州洪丘山舊隱志士涵正氣不露荆虹輝一逢龜臺人慷慨脱繡衣去冬來江南還尋舊游處榾柮聚談𤣥愜我平生遇天地本不老江山生古情春風動歸興散入流鶯聲洪丘山上雲錢塘江中水滄江日夜奔急流只有青山是知已歸去來歸去來白雲滿山花亂開挽俞古梅三首力盡穿楊事可悲棲遲城郭自儒衣青燈夢寐功名逺白髮光隂志願違死悟潰癰皆幻化學窮大易到𤣥微案頭書卷塵狼籍珍重東床為發揮西湖遺老盡銷磨屈指如君數不多聞説篇章常見許每逢休暇即相過膏肓病證無良藥生死交情入感歌為問梅花全古節嵗寒心事欲如何古言七十人希有惟恨朋簪失典刑註易麻衣才脱藁讐書光禄罷傳經未化前三日夢中言詩記此二句髙門已繼中郎女後夜虚瞻處士星岑寂南山山下路緑隂黄鳥不堪聽贈心山真宰凝空無靈樞運百體顔子契坐忘淵明得真止妙感潛至寂詎作死灰擬風雨撼不動疇能計終始送姚江村回髙安聖賢法大道二氣調闢闔所以稷契心妙與古先合載聞盛明世總總任英達夫子璠璵器聲價久合㳫迎師不憚逺遂下陳蕃榻聖經光日月接要延問荅始知經濟材硎利若新發斯文藉彌縫善建固不拔錢湖舊游地即事傷素髮木落洞庭波商氣倏蕭颯緬懐千里蓴已覺寸心渴余衰矍鑠久送逺乏挈榼清江浩茫茫扁舟待明發送達卿焦使君疇昔相逢事壮遊盍簪人物盡名流蚤登霄漢辭朝列老向錢塘作郡侯井邑民歌千里月河橋客散數帆秋西風滿耳蟬聲急明日思君過别州冬至即事二首今日陽初復比隣相賀喧門深車馬盛筵秩管絃翻華屋皆新主寒梅只故園鞲鷹仍得意飽肉但飛鶱結屋傍湖水對門三四峰心灰無復煖鬢雪近來濃孤雁雨中過短書燈下封平生故人意衰老不相從髙樓晚望徙倚髙樓今古情暉暉晚日故留人真傷令節經冬至細數行年又甲寅樗櫟此身從物棄江湖舊友得書頻濁醪未必消愁絶為見寒梅發興新溪月王真人被㫖入覲謹賦五言六韻詩奉餞分韻得在字天地鼓橐籥道備域中大彌綸宇宙間妙寓無不在真人體道用翊教際明代飛書下寥廓指鶴促行邁游雲澹微霄凉飈引虚籟二月江花開回車定相待為北村湯同知題畫卷二首山人慣識山中趣來訪山家陟山路轉頭萬事總不知只有秋聲在髙樹黄塵浩浩眯人目怪石急流生野姿溪橋不放車馬過山頭樓觀秋參差不眠不眠今夜月為我照書堂古木移長影飛星引細光嵗華行漫與人事日蒼茫自愧忘機客蕭蕭兩鬢霜嵗夜喧聲爆竹九街傳瑣瑣悲歡又一年魍魎已驅儺有道屠蘇先飲我無縁傍人燈火真相向殢食兒童强不眠休説開元舊時事長歌短髮易凄然題晝醉曽入咸平處士詩温存還向畫圖披須知小草難真醉飢鼠跳梁莫謾欺擬常建題破山寺古寺破山色入門松竹隂雨花傳祖意坐石契禪心潭靜白雲上月髙清梵沈幾時辭一尉尋社入東林讀漢明帝紀穆穆中興禮樂風雲臺諸將已論功如何海宇塵氛靜至死無人説祭彤題鶴泉圖我聞匡廬之山青入天上有瀑布千仞懸嵌空金碧根髙源噴薄直自太古前未知鑿開混沌竅神物茫昧誰之然翩然皓鶴來何許心融恍聽泠泠語云是遼城丁令威𤣥圃崑丘曾一舉為嫌天上多官府偶向人間值風雨稻粱與魚蝦瑣細不足數空餘舊標格燕雀莫敢侮令威令威我欲從之遊天風萬里㝠㝠秋力小羽翮短六合安能周乃知摶鵬鷽鳩各有分不如榆枋飛躍棲林丘和仇仁近教授見寄詩韻君詩如錦我難如為報交朋逺寄書爆竹又經椒頌獻浣花終卜草堂居百年過眼春排遣萬事傷心酒破除白髮滿頭還自笑一笻風雪出無驢霞外詩集卷六
