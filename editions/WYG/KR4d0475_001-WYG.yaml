body:
  text: 霞外詩集卷一元馬臻撰春霽書懐紛雨洗游塵潤物亦已足淑氣浮芳鮮山澤一時緑回鴈逺零亂流雲髙斷續伊余愜所向偶景相穆穆好鳥如含情不語立嘉木靜知春事佳老覺世味熟遂展平生情誰復辨蕉鹿五雲山寫望少乏超絶姿瘦鶴存野格乾坤心自放頗覺塵土窄安得千金槖使我窮地脈征途多荆榛此志寧復得今晨躋山顛納納瞰廣陌正東臨大江髣髴海外國孤帆揚長風靜入秋氣白層巒引列嶂下有雲霧隔不知誰家樓突兀立逺色禹穴指顧外厯厯禾黍黒簸蕩千古愁人世一過客髙歌據苔石坐見日車仄目極窮㝠搜一鴈没空碧山中早梅孤根徹后土破冷爭春回惜哉氷雪姿落此荆榛隈若生白玉堂不負黄金罍一見一惆悵再歌再徘徊未央宫中花直待羯鼓催遣興二首長日閉門坐軒車誰與親鶯花欺白首鮭菜足青春今古斯文在江湖舊業貧丹心不可道風雨夜來頻老木蒼蒼合幽禽瑣瑣喧坐長樓轉影靜極客忘言雲物何時定亭臺幾處存虚懐推至理隨意且芳樽竹窗竹窗西日晚來明桂子香中鶴夢清侍立小童閒不動蕭蕭石鼎煮茶聲題墨竹拂雲標格嵗寒心墨色分隂重又輕不似渭川千畝緑只和風雨作秋聲雪夜仇仁近屠存博數先輩過山房分韻得朝字溼雲結空寒氣驕雲根古觀埋山腰山人宴坐觀物化竹風松雪聲飄蕭二三才子相招邀聨軒過我歡清宵小閣閉暖蠟光揺案頭置酒羅桂椒劇談若與元氣合銅匜火冷青煙消城樓殘更敲短夢鼾眠縱客嘲邊韶我無詩才學李杜又無仙術追松喬人生此㑹能有幾今朝未必知來朝請君得意歌且飲江上春風吹柳條偶成昔嫌上界多官府不道人間足是非四十年來悲喜夢倚欄閒看柳花飛詩愁城中親舊渾零落湖上園林幾變更只有詩愁消不盡旋隨芳草眼前生春日幽居淺淺春風尚帶寒日斜香篆半燒殘杏花一樹開如錦怕觸啼鶯不倚䦨春雨良㑹時不偶徒為物所嬰驚雷啟羣動有鳥遷喬鳴徙倚流逺日瀰瀰川去平風色誤花信春光消雨聲念此睽心賞取榼聊自傾幾微存倚伏兹理何㝠㝠孰能繼髙唱欲罷難忘情寄題終南山甘河鎮遇仙宫七真遇吕公傳道處秋空劍别洞庭波道本忘言又若何人事百年迷苦海仙源一脈㑹甘河金蓮既秀真無待𤣥理雖深語不多惆悵終南笙鶴逺五雲宫闕自嵯峩湖中春遊曲堂堂復堂堂畫鷁誰家郎繡旌鴛頸冷膳府鸞刀光傾椒注桂邀流芳楚腰絡索聞懸璫箜篌急響如相惱岸頭折盡忘憂草黄金慣積自媒身隨肩滿席惟嗔老牙籖萬軸齒不拈孟客何賔跡如掃柳綿撲撲乗風吹花翎小鳥啼訴誰玉郎沉醉晚未醒春光去矣猶不知白鷺吟肩髙聳受風吹西塞山邊細雨時不染丹青愁鶴妬自矜清白見鷗欺某丘有樹猶堪宿何處無魚可療飢振振飛來應得意也曽物色到周詩為葛元白賦閑境大觀均喧寂結廬在人境所以葛天民妙處心自領靜者非有期物役敢馳騁有時絃歌聲清絶百慮屏坐久白日動厯亂竹木影翻笑龎徳公深向鹿門隱山林野客如龜藏造次數上君子堂先生髙卧北窗下曲肱一覺回羲皇門前參錯自車馬黄塵烏帽春茫茫春茫茫日欲老中有青天白雲落花芳草夢回不記邯鄲道危坐危坐不覺久月照一庭緑三更白露下夜氣溼野服恬淡失悲喜視聽非耳目閒將黄庭經更趂月下讀越中言懐分甘茅屋老蒼苔不是明時棄不才避社燕歸楊栁合趂虚人散鷺鷥來半江落日明漁浦兩㟁回潮掠釣臺呉越爭雄俱一夢年年杜若滿汀開遊雷峰寺雷峰壯南屏窣堵林外出老僧舊識面邀我一登陟髙回星漢流靜壓山水碧晝有白雲飛夜有明月入諸佛似安禪脈脈度朝夕野人怯髙險欲上股先慄不如履平地彼此無得失初春即事東風又到武林城靜裏看春各有情怕説利名多晝睡愛尋山水每閒行傍人冷笑營巢燕求友翻憐出谷鶯世事不窮時易失翠微深處夕陽明二禽篇杜鵑杜鵑聞爾曽為蜀天子一自城荒爾身死當年御極日萬幾何苦今朝自如此恭聞太上垂𤣥言治大國兮烹小鮮流情縱逸不追悔無端却恨春山烟毛衣鑑縷滿身黒萬里岷峨歸不得六合茫茫啼一聲春風為爾無顔色鷓鴣鷓鴣不知春色何負汝每到春來聲更苦百年不得此身安尚憶當時在行旅爾不學大鵬一舉培風兩翼如雲垂又不學籬邊斥鷃翺翔飛躍蓬蒿枝黄陵廟前幾春草空遺怨恨傳新詩江南二月煙花亂子子孫孫自呼喚説盡人間行路難凄風苦雨心腸斷貴公子麝沉灰暖瑞煙輕十二闌干轉畫屏翠袖閒調鸚鵡語牙牌分牓牡丹名半垂簾幙因春冷未放笙歌為宿酲颭颭流蘇風不定隔墻時送賣花聲雪冷逼街頭酒價髙晚來風急更蕭騷青樓醉舞不歸去江上一蓑憐汝曹送仲澤邢講師回汴梁寒日照呉山北風吹汴水山水一望間客路二千里是時𤣥冬月飛光促短晷之子忽言邁孤舟送行李仰睇極空煙嘶鴻入幽耳人生難滿百㑹合良有幾四海非無交利害射如矢鸞凰慕竹實雞蟲競糠粃悲哉道不同反為世所恥所以送君行感慨莫能已中條萬古青旦暮白雲起何時來卜鄰結茅白雲裏奉酬容齋徐廉使魯國真儒惟一人魯國多士徒紛紜紫微列宿光熒熒朅來蘇彼南州民夫子之才難比數復使清時見伊吕一夜霜風動列城黠胥縮膽如飢鼠棠隂欲轉公事餘髙堂晝永娯琴書千村萬落雞犬靜山民野婦安樵漁昨朝來過幽人屋亹亹𤣥談唾珠玉他日重期掃石床為啜山茶薦秋菊呉江夜泊不見天隨子令人逸興孤村砧聲自荅岸鳥語相呼河漢回西極星辰入太湖古情吟不盡明月照姑蘇宫怨多愁多怨怕春天花外時聞警蹕傳金縷繡衣渾不稱餘香猶帶御爐煙釋宫怨萬頃恩波一寸心玉堦青草斷車聲文章近日無人愛休把黄金乞長卿張野泉偕虚谷方使君趙春洲數先輩見訪即席賦詩各以酒字為韻幽居扄青春水軒僅如斗敲門問誰來過我得良友浮雲無停隂霽色破古柳人生不自適嵗月欺老醜欲挽湖水春添我盃中酒酒盡意不盡落日照魚笱掀髯出門去悲歡一何有簡野泉兼呈同席諸公黄河一清一千年天下何代無才賢蘭亭㑹散日已逺茂林修竹閒風煙西湖山水古竒絶佳句已屬峨岷仙我住湖邊六七載此跡雖滯心𤣥𤣥靜觀羣動趨變化敢與物態分媸妍不知門外春已晚游絲暖絮晴相牽每思古人去不返肝膽偪仄愁如懸誰言我輩異古昔賴有故人張野泉攜詩載酒忽扣戸須臾品饌羅其前座中羣彦皆詩伯侈靡齊梁不足律坐驅澆薄回大雅氣豪頗覺天地窄君家城東我城西一見忽憶數年隔吁嗟嵗月不待人况復此㑹難再得狂歌浪飲春亦驚剰水殘山晚蕭瑟酒闌客去竹木靜坐久稍已收衆色向來喧寂何所之蘧蘧夢破東方白月下聞鶴山對澄湖樓對山愛山終日倚樓看洞天何處鶴歸晚月下一聲風露寒奉簡似山郭髙士仙翁仙島住應運下人寰讀易天心合論詩春思閒鐘聲太一殿草色武林山應有推敲者月明來扣闗送郭似山回張公洞春風吹沙春草長雜花媚煙飛野香幽華裊裊泫雨色人間光景勞中腸赤城老仙呼鶴起迢迢直度太湖水玉洞碧桃凝古芳𤣥扄窈窕羅疏綺吟詩贈别情相闗霧節風幢幾日還歸來無語生幽寂啼鴂一聲春晝閒題龍舟卷樓船耀日青天轉容與中流棹歌逺漢武仙遊竟不還汾隂幾度秋風晚至今流水愁無聲空令畫筆勞經營人間萬事等一笑雲淡天長千古情無事無事每日不出戸滿院松竹森交加晝眠厭聽啄木鳥早凉喜見牽牛花一真自可了生死萬事不必論等差誰能屑屑管迎送客來且試山中茶瑞鶴詩上大宗師真人皇皇古道尊三五雲從龍兮風從虎至尊垂拱四海寧詔令昭事𤣥元祖維時羽服昕趨朝環珮參差肅儀矩大哉聖徳合天心霓旌晝下胎仙舞初疑瑞雪飄晴空漸似雲衣來玉宇瑶壇春靜立多時碧落風清更延竚竒祥所致森有神閶闔門開又髙舉是日天顔喜色動蕩蕩肪階儼干羽乃知無為無不為真化風行邁前古真人有道通杳㝠力扶至教垂常名野人獻詩欣再拜山林自此陶休明上延景祚康黎民萬嵗千秋歌太平龔聖予畫瘦馬行在昔開元曹將軍徤筆突兀老入神能貌明皇玉驄馬博得聲價輕千鈞後來韓幹只畫肉少陵不許肥失真寥寥此道幾懸絶至理不付尋常人淮隂龔公老儒者落筆文辭馳二雅有時快意掃骨馬妙處不在曹公下畫時想極虚無垠思入萬里沙場昏凝精洞視色不變杳㝠之中百體存相經合備渥洼種仰首鳴天鼻欲動氣豪似與神龍爭疾雷迅電驚塵夢憶昨嫖姚騎戰時旋雲轉霧飛四蹄翻然踏碎闗山雪歸來汗血光淋漓霜枯萬骨功誰利太平總為將軍致如今衰瘦箭瘢乾生駒却受黄金轡此馬此畫絶世無先生慷慨傳此圖可憐韋諷日已逺獨撫此畫深嗟吁北風動地天色慘展開猛士寒摇膽詠罷新詩無限情卷向空齋白日晚夜坐空山髙寒雲不凝綿綿夜坐神宇清泥丸朝退月露滴但聽下方雞犬聲贈雲屋瑞上人曽擊鳴鞘羽衛前毳袍錫杖且隨縁田園賣盡思行脚師友參多學坐禪閒説升平猶淚下因傷老大自心憐回頭好趂歸時路不見人牛月正圓摘園橘寄戴祖禹幽園逼湖水闢地種嘉橘時雨既霑濡培養藉春力憶昨開小花清隂正繁密疎簾白日靜香氣散書帙邇來八九月喜見纍纍實因思造化功具此霜露質張華吟未工慧老畫不出大者發至精錯落金相射小者凝元氣低垂綴寒碧山鬼亦見避老烏不敢喫昨朝喚山童提筐事採拾落刃緑霧飛入手流脂溼我恐殄天物精爽颯如失遥憐洞庭山萬樹風雨夕焉能飽一看路逺不可即須臾遶行廊吟詠意方釋童僕不好事笑我太迂僻為君薦樽罍聊復慰相憶項王叱咤猶傳數里驚隂陵失道已沾巾江東父老羞相見忍可捐軀遺故人弔崔雲山埃風蕩天荒孤山卧秋草君家孤山下不厭孤山好昔我山中房識君師侍傍白髮映蕉水玅語回羲皇聞君又絶粒黙黙宴華室道畢合神風回車朝帝一制魔誠所難有身良可嘆層隂翳太景平陸翻狂瀾憶君出門去相看淚如雨始欣天道還逸駕倏飄舉有詩君莫吟有酒君莫斟神交動恍惚尚想聞空音我歌山日落松聲起寥廓魂兮其有知為我來㝠漠幽室苦夜長思君念春陽春陽難復見短歌不成章述懐家無負郭田何以懐歸耕豈不有他好復恐勞其生窮居四十年富貴浮雲輕乳鳥喧髙枝壯心忽然驚所憂聞道晚徳業將無成言此向知已欲語已忘情送郝景文闕之京江上草已碧送君傷别心聽雞臨曉色䇿馬度春隂驛路燕山逺風花漢水深道人無外事林下問除音送孫大方講師回汴梁朝元宫遊遍江南山水地仙翁歸興動旌旄青溪人去鶴聲怨碧落風清劒氣髙驛路野花心獨逺江鄉夜月夢應勞到家想得春風晚開盡𤣥都觀裏桃山人山人行止在山林生怕侯門説姓名蟲臂鼠肝分得失奴顔婢膝事逢迎一聲啼鳥湖煙暝滿地落花春雨晴自煮新茶試新火坐看斜日轉窗明送姬講師回京冷雨逼古春春華溼蒼翠生意老不化節物為憔悴悠悠山川長念子之何地臨岐各慘淡草草叙别意達人不患貧貞女不事媚至道貴冲漠澹然有深致後㑹殊未期願君勉斯志聞杜宇飄泊身同泛梗萍年年因爾更闗情半啼半哭深含恨飛去飛來不住聲日落逺憐行客過風微閒見落花驚故家喬木彫零盡一夜月明芳草生歩虚詞逸轡太景阿蕭蕭導𤣥鈞虚節合萬奏髙㑹㝠五神隂陽鼓靈風一炁無不均淡然眄至寂大道無疎親適路非有待上仙齊飛輪哀哉貴終道塵波淪肉人丘垤祕濁骨大夜難希晨靈明喪愆穢繾綣來去因何不散爾想復此空中真虚舟縱風柁放浪無涯津期刼倐忽周真空浩無垠卓然吾獨存㑹當哂靈椿看春西湖二月春風豪蒲芽一日三寸髙慿軒不語笑桃李施朱㸃白真徒勞春日寫望逺山重疊限空明淡拂生綃絶㸃塵半舸夕陽喧酒客一樓寒色倚詩人早鶯懐舊隨時至芳草無情著處新却憶城中有貧者杏花開盡不知春山中寒食青陽轉節候雜芳麗原隰山中寒食近啼鴂亦已急新塜有人祭古墓無人泣傷心名利骨瑟瑟土花溼石馬悲無聲空對東風立春霽陪葛元白游南山積雨淹幽事初晴得此晨問舟尋上客放歩約同人偶入招提境如酬宿昔因禪心本無住吾道豈憂貧城郭千年鶴林丘一聚塵歡娯時不偶激越意空陳路改疑前夢雲孤憶老親彈琴僧舍晚覔句酒家春閒水文輕縠平蕪展細茵目驚流節駛心醉古風淳久識窮非鬼難言筆有神感深將下涕喜極欲忘身蹭蹬繁花老隂沉亂葉新野夫元懶放杜宇足酸辛更欲東蒙隱難期北郭隣有懐聊自適愧爾葛天民喜晴久雨山水暗荒雞鳴膠膠貧居匪琴書何以勝寂寥今晨户牖白天宇回光昭日華引生意衆卉緑寒條浮隂滅餘迹逺逺帶六橋蜂聲逺樹轉水影和春摇豈不展好懐潤我顔色凋床頭濁醪熟清士亦可招俯仰已陳迹疇能計明朝田家地偏生事僻轉覺入城遥犬吠三义路人行獨木橋炊煙時滅沒村酒自招邀昨日蠶新浴柔桑緑滿條姑蘇逢鄧覺非春夏忽已交放舟别吾廬計日念行邁薄言寓姑蘇出門無所從桑麻藹丘墟與君敦夙好邂逅臨長衢指我屋頭柳髙隂正扶蘇一室無長物清心有琴書洗觴酌醇酎呼童摘畦蔬乃知天壤間靜者樂有餘名者實之賔此語真不虚熱盛夏勢莫當昊天日亭午亢陽流赤光崇岡裂焦土夸父不知疲暍死自罹苦何不挽滄溟大霈天下雨寄越上友人分袂沙邊兩嵗餘生涯别後竟何如雲迷禹穴無來信秋隔呉山有故居思斷碧天江漠漠吟低白日雨疎疎郊墟昨夜新凉入珍重佳兒好讀書和陳無逸見寄詩韻感君髙誼曽傾蓋豈意今朝辱贈詩徤筆驚人秋浩蕩流年傷我老差池論文每恨識不早題橘徒能寄所思便欲相期賦招隱計疎難辦買山資身世身世寄悠悠閒門寂似秋時清孤劒化齒落萬縁休欹枕日下樹捲簾雲入樓近來添薜荔生滿屋山頭中秋見月去年中秋月團團上林藪文士兩三人竟夕坐相守精光浮白空誰見蝦䗫醜觴酌雜歌吟待得下髙柳今年中秋月輝輝入窗牖照我如有期怪我樽無酒月是去年月不復去年友人生如風花聚散良不偶賢愚與貴賤肉骨同一朽我今見明月再拜復稽首側聞古老言此言豈虚有正秋三五滿萬里絶纎垢玉兔搗神藥服之夀長久我無周生術安得月在手天梯邈難攀中扄欲成疚萬方浩漫漫月輪又西走秋日山家落葉不肻住堦前知幾重飢禽窺綻栗危石俯喬松日午客初到路迷雲更封何時了塵事卜築肻相容為張仲美畫夢元遺山雪夜論詩圖虐焰焦𤣥根古道日淪墜安知大化中元氣塞天地遺山與仲美先後本一揆上士以神契㝠㝠感靈㑹長淮夜風雪清夢短檠對𤣥􅃐非名言豈索形骸外煌煌三百篇光焰髙百世曰予託人境塵土觸肝肺苦吟愧蠅鳴况復事粉繪諸公足題品靡靡發真祕持此寄逺心江漢已秋意中有號風蟬哀哀響寒翠存此山寄清游藁秋風杖錫别多年細讀新詩盡極𤣥却憶姑蘇雲外寺月明誰伴夜深禪秋日即事芙蓉凉淺未全紅稚子攔街鬬草蟲節物變遷風景在故園心事不言中秋懐大火徂秋節炎炎幾何時今日昧明日敢作百嵗期凉風昨夜來西山白雲起舟人吹鷓鴣愁蕩一湖水嗟余寡所見就失𤣥髮歡獨坐待明月恨入青雲端自古賢達人誰獨免其死靜言求此理如此復如此呼童買美酒趂月傾樽罍雖然不解飲聊復暢此懐題日觀蒲萄卷老衲搏空無混沌為之闢拔得天地根不假雨露力寒藤挂鬼眼纍纍冷光碧驪龍亦驚猜夜半風霆急排悶諳盡時情薄似煙更憑誰覔買山錢催凉雨久添秋恨待客茶頻廢夜眠身退每蒙先達許詩成多得外人傳榮枯已悟須臾事一住湖邊又十年凉夜遺編掩罷又重披老去悠悠記性遲正是月沉燈半滅一園凉雨草蟲悲蛺蝶栩栩復翩翩迎風勢不前草根時㸃染花處自留連怕冷多尋日爭髙欲上天誰家騃兒女相逐過橋邊霞外詩集卷一
