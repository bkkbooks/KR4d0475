body:
  text: 霞外詩集卷十元馬臻撰題𤣥覽真人溪月圖溪風灑露兮弦月承雲儼真人之宴坐兮存夜氣之氤氲隘城郭之窘窘兮結塵夢而方殷送自誠真上人回秋溪普門舊業二首新詩吟得送詩僧寺憶秋溪到未能依舊入門風景在心明不昧佛前燈厯遍諸方合是歸津津喜色到家時殷勤問訊山中月曽照青松長舊枝和王仲道明府隱居詩韻二首身世誰能定卜居小舟風急信籧篨蓴鱸味美歸張翰詩禮家傳見伯魚春靜西湖勞杖屨道閒白日且琴書利名蠻觸非吾事滿耳松濤晝睡餘瘦竹勝巢笑拙鳩倚闌閒為晚風愁士貧始見身為寳齒落纔知舌尚柔靖節琴書三徑草𤣥真簔笠五湖秋相逢各自頭如雪指㸃江山説舊遊次筠軒詩韻幽軒列萬竹愜此冲澹襟乃知心跡逺不在山林深客散動秋影鶴歸分夕隂至樂寓言外任鼓昭文琴再題白湛淵買宅圖後靜者貴行止即事在厥初君家鄉黨敬稱善真不虚昔我當青年寫君買宅圖清風羅竹樹曲沼䕃遊魚嘉賔㳫然至日以清事娛稚川昔移家提挈何區區少陵得草堂經營三載餘東野亦移家家具少於車君今向人境森爽葺其廬居安則資深無乃種徳歟復見屋下郎箕裘振文儒展卷三十載撫迹肝膽舒願保嵗寒節看教諸孫書寄平江開元丈席恩斷江闔閭城裏開元寺信手拈來敞法筵有道不勞方外疏住山􅂓結世間縁化歸檀施僧能説詩出叢林客任傳截斷衆流江自在恩波湛湛碧連天敬讚純陽真人畫像自從樹老城南月不把𤣥機輕漏洩秋風千古洞庭波是凡是聖從渠説畫意二十二首千樹萬樹桃花發三聲五聲鶗鴂鳴溪山春色媚人眼但見物物生詩情晴雲冉冉拂空翠羣木隂隂生夏寒弭楫􅂝琴訪溪叟世塵膠擾知音難亭亭樓觀藏山㘭上有疊嶂爭秋髙支笻共語不知逺轉覺身世輕鴻毛寒空黯淡飛鳥没某丘某壑同一色絶憐驢背苦吟人風雪打頭烏帽側紅塵梅裏懶低顔石路迢遥入亂山擬向雲邊種黄獨幾時容我屋三間山凝太古洪濛氣一道飛泉瀉蒼翠小樓屹立溪影中應有伊人共幽意支笻路入諸峰頂回首繁華謝朝槿古來天下多名山不是終南終不隱江花江草映江樓寫出江天一片秋隔㟁小橋低數尺淡煙消處見漁舟石逕盤盤入翠微山腰樓觀白雲飛微茫野外人煙晚一片風帆何處歸城中車馬自喧譁江上清風未有涯欲遂平生瀟灑志數椽茅屋傍漁家千章古木間青紅路接溪橋出􅇀鐘衰老無人賦招隱山雲更入兩三重江村日暖春㝠濛李花如雪桃花紅山長水逺望不斷盡在乾坤生意中呉儂生長浙江干慣見秋濤拍夜灘老去怕風兼怕水不妨傳入畫圖看有客騎驢入林麓山深疑是王官谷平生輸與釣魚翁獨木橋邊結茅屋江千秋染斕斑樹杖䇿幽人入雲去應是當年李謫仙來卜匡山讀書處數間草屋山煙靜夾岸桃花流水香愁殺武陵回棹客不知人世幾斜陽平生丘壑老棲遲敢信毫端為發揮忽憶楚江江上見雙帆怗怗帶雲飛溪翁住處臨溪水一道飛泉翠微裏西山爽氣爭秋髙樓觀參差白雲起幽人自樂山中趣閒訪山家入山去記得西峰阿那邊亂雲遮斷無㝷處青青疊嶂摩蒼天下有五湖煙水連漁家小橋雨新漲扁舟繫傍茅簷邊江雲皛皛侵林影境㑹心融發深省可惜長艘載利名乾坤清氣無人領縁溪路滑蹇驢遲水色山光總入詩還勝襄陽孟夫子滿身風雪灞橋時祖塋冬祀𤣥冬萬物瘦拱木自青葱感彼霜露降及兹成嵗功衣裾冒草逕柈飣羅山風慮斷寵辱外神交生死中念真故洒洒結抱還忡忡音響一何寂道論嗟無同偶成松風寄一龕蕭瑟我相諳雲海鷗盟冷名場蟻戰酣履須經實地道豈事虚談世態從欺老欣欣雪滿簪為嗇齋吕髙士寄題大瀛海道院茫茫大瀛海羅絡后土流象山襟爵溪一㸃波中浮昔日安期賣藥處至今海月懸髙樹丹丘羽人結瓊居誰道人間隔風雨三山滅没金銀臺聞有仙人時往來仙人不可見白髪令人哀安得再拜訴王母謫仙本是凌雲才挽饒國呉公二首夀櫟仙翁八十餘泥封初拜大司徒九重恩寵光瓊圃一段精神炯玊壺子領羣仙天上有身膺五福世間無更聞蟄蟄傳詩禮輝映鄱陽月滿湖髙門善積異殊恩三達稱尊古不如已向晚香娛嵗月更看榮禄表鄉閭耆英社冷虚元老碧落班催覲帝居𤣥徳真人應夀母長生有鶴下天書和越僧吉半雲見寄詩韻豈有詩才逼浪仙謾教方外姓名傳句忘雕琢才幾道理絶名言不異禪野鶴夢迷滄海事髙僧吟老翠微煙剡溪山水留佳趣為報扁舟待雪天題草蟲畫卷喓喓趯趯自知機展卷誰憐下筆時采得國風千古意分明一段召南詩題赤壁夜遊圖絶壁驚濤故壘西扁舟明月夜何其樂遊不記元豐事只有臨臯道士知挽月泉呉提㸃二首桑梓同年數不多長懐令徳養天和典刑已共推前輩言語真能入四科心殆𤣥門傷舊業病侵白髮動哀歌斯人已矣堪凄斷吾道悠悠竟若何壯年曽約隱茅峰鵬鷃飛翔勢不同榮被宸恩敷教雨晚安琳宇贊𤣥風潰癰忽悟南華㫖施藥難收扁鵲功六十八年多少事泉聲依舊月明中深靜亭徑曲藏林表亭孤逼水湄頓忘三伏日渾似入溝時市逺聲不到魚馴樂自知可堪文字飲慚愧少陵詩和秋日山行詩韻石路遍秋草朋簪信杖行嶺雲隨眼變野菊向人明澗水流元氣山風埽世情誰家猶紡績機杼隔林鳴春日口占豪士惜春不惜金老夫得句如得寳固知貧富本殊途各向東風展懐抱𤣥教大宗師張真人挽詩秀鍾河岳氣弧矢射生申龍虎聨真裔山林得偉人垂衣詢道徳舉鶴上星辰慶際風雲㑹光依日月新簪裳沾教雨砥柱屹天津望重山中相經傳席上珍談𤣥無野褐論道列朝紳琳宇開張盛彤庭錫予頻累朝親眷顧一品出絲綸忽憶三天事俄遺大患身玊棺下雲外草座失河濵骨俗蒙甄冶才凉只隱淪窮猿甘向老尺蠖竟難伸涕泗嗟何及名言不可陳天風舊時路回首鼻酸辛贈别友人湖海清秋日山林白髮翁未能從上下忍為各西東老别驚霜草深情引斷鴻天寒物色薄摇落晚來風讀石田詩有感三首吟看三數過不覺燼寒燈意趣無非道交游半是僧課書貧自樂媚竈夢何曽自後言詩輩苦心終未能雕搜還不到姚賈是宗風勢立典刑上句存規矩中片雲孤嶼逺寒水夕陽紅此理言難㑹㝠心感化工悟門難槩入轉讀轉堪傷天地因經緯風騷張紀綱髙秋明素髮老菊傲繁霜物化精神在中心何日忘為義齋方山長賦青山白雲圖𤣥英先生釣鼇手結廬正對桐江口坡陀四面環青山山上白雲終日有青衫博士居臨安萬山遶屋心自閒松竹林中讀書處白雲往往來其間𤣥英隱處昔曽見出岫無心如有羡為與先生芳譜聨臭味相同故相戀老我營得屋數椽錢塘湖上連秋煙青山白雲夙所愛為君寫入圖中傳送僧山雲上人山僧業在山深處自縛衡茅共雲住何時杖錫下山來錢塘煙草無心遇針芥相投杜徳機山雲無侣又思歸三盃春酒贈行色江上梅花如雪飛和山村見寄詩韻七首一經屹屹自窮年門巷無人問草𤣥安得雲龍隨上下還憐鑿枘失方圓間闗啼鴂春多恨牢落鰥魚夜不眠萬物去來天理見薰風未必競繁弦一舉曽聞累十觴即今酒量復誰强聖賢趣在中清濁鳬鶴天全任短長靜裏支頤觀物化閑來袖手看春忙功成名遂身須退千載清風緑野堂山人夢不離山林歸隱蹉跎愧孔賔平淡詩章心自得空濛煙雨畫難真室如懸罄那愁盜語不能神懶向人莫道無金憂不足黄金入眼也成塵閒愁常問竹平安竹外樓髙眼界寛覔句不孤池夢草休官猶得隴栽欒浮雲易散傷鄰􅐟至藥難成失露盤莫負杖蔾行處樂江花江草滿江干得失悲懽較幾何西鄰雖富不曽過昔賢已分安漁釣貧女無心在綺羅挺挺松椿禁雪老紛紛桃李占春多憂來俛仰人間世背立斜陽讀九歌休將野服染緇塵大患須知為有身藥餌任從留過客是非終不到閒人山中相隱懐𢎞景谷口躬耕羡子真午睡醒來春事晚枝頭梅豆已生仁不成一事鬢先皤朋友偲偲喜琢磨千里音書歸雁少滿城風雨落花多迸堦新笋微過竹脱繭春蠶欲變蛾惆悵少陵身老大壯心激越醉時歌夜坐青燈照不寐食晏腹猶果開簾知夜分片月依林墮積雲忽如漆老樹懸神火遊淡遣歡戚意足物常黟窮達與死生自古非獨我胡為露電中寸心空瑣瑣為僧賦月巖二首髙巖挺雄姿本根插地軸青天月飛來炯炯照幽獨我嘗觀徼妙識此真面目理愜心自知慎勿語流俗明月無古今寒巖了今古體用元不殊明晦從吞吐既不昧本根疇能畏風雨持此問虚空虚空定相許追和南谷杜真人山居四時詩寄昇元主席桂菴姚提㸃四首滄海雲迷鶴信稀地偏無客欵柴扉碧桃開盡春狼籍日􅇀采芝人獨歸石底幽蘭隔澗香新篁楚楚出林長道人無語倚松坐羽扇不摇心自凉風瓢厯厯挂松梢慙愧心難繼許巢昨夜朝真衣露冷殿隂斜月轉螭㘭笑看功名蟻戰酣飢來自挹曉霞飡無端靜裏生吟興一夜猿啼雪嶺寒再和山桃野杏風中稀青山對面開柴扉家童破曉摘茶去日午穿雲猶未歸石泉潏潏幽草香日景陡覺山中長出門倚杖看雲起巖壑隂風生晝凉浮嵐半没長松梢落日正照白鷺巢他年容我結茅屋定知卜築青林㘭蒼苔濁酒凝醺酣山崦人家炊午飡隂雲淡薄不成雪散落下方風雨寒和陳仲庸春晴詩韻一榻寧無坐客氊典琴還辦酒家錢幾番夜雨東風惡三月清明上已連汀草乍濃纔見蝶山花正好未聞鵑趂晴莫惜㝷幽歩春去春來動隔年寄題桐江鳳山寺鷺雪軒西湖西畔茅家歩鬱鬱喬松宿羣鷺自從樹老浮雲空夢斷滄洲留不住今日桐江江上秋鳳山寺對青林幽紛飛萬㸃下晴雪軒窗晝敞明雙眸物色所寓真不偶千古煙波一回首可憐不見羊裘翁空屹髙臺大江口鷺耶雪耶心叵量倚闌對境還相忘他日滿林生竹實㑹看翔鳳鳴朝陽和蜀僧明上人詠雪詩韻二首不教禁體犯毫纎詩令還同酒令嚴村巷漸深愁桂玊山家任密慣虀鹽吟餘已怪冰生硯夢覺猶疑月在檐獨有喬松丈夫氣凌寒特地傲山尖薄雲猶見月纎纎陡覺寒威夜更嚴謝女已能吟比絮坡仙休嘆食無鹽聚時曉徑雲生地消處晴空雨滴檐記得當年天目頂冷欹烏帽望西尖集句遣懐三首懶慢無堪不出村當年心事與誰論如今老去愁無限雨打梨花深閉門紅塵無處不喧譁江上無人轉憶家寒食清明都過了夜來風雨送梨花且盡芳樽戀物華猩猩血染半園花東君自是人間客看到子孫能幾家送蕭存逺主簿之京交道無故新前哲有明儆解后憩寒齋水木交秋景方君歩凌雲顧我髮垂領離情霜柳斷去迤川途永金臺多故人天風候鳬影和山行詩韻二首秋風吹亂山山在白雲間老木忘今古幽人自往還柈餐麄糲慣樽酒語言閑悵望冲霄鶴寥寥不可攀今朝風日好有約㑹詩家路勢依山盡秋聲落雁斜凄迷孤嶼草滅没小春花人事堪誰比汀煙薄似紗寄湖山張太監楓葉蕭蕭霜滿林蒼煙寒結半湖隂三冬書巻千莖雪萬里綈袍一寸心驛路山光歸騎穩天門春色景雲深終看衣錦行清晝乾鵲枝頭聽好音村行遣興物色憐人意逢迎似有期野鶯啼半日山客聽多時崖蜜攢花就村橋架竹為閑心與閑景未必市廛知題山隂回棹赤壁夜遊圖二首夜雪蕭騷入剡溪髙懐忽起故人思當時興盡不回棹千載誰傳一段竒穿空亂石驚濤拍月滿孤舟從二客覺夢悲懽總不真一聲鶴唳東方白觀周景逺御史題讚雲叔羅教授喜容三首十年訣别萬山翁翰墨凄凉到眼中軒冕不移湖海志即今還有幾人同仁義根心禮數寛常言懶著惠文冠不知墓石誰人誌潛徳應傳後世觀新城昭諫耳孫枝雞黍情親更不疑貌得真成曽著語平生言行只君知送本初朱提㸃之玊隆主席五首風虎雲龍㑹有期文章道徳際清時名山正要名師住喜捧天書下玊墀衛道金湯佐上𤣥袖香常近御爐邊仙人出應龍沙合合主林泉五百年自憐學道晚無成華髮蕭蕭不受春多謝東風湖上柳每開青眼盼陳人蕉池月冷憶論詩别去無端信息稀衮衮相逢又相别一江春水看帆飛笙鶴遥知出郭迎歡聲雷動豫章城碧桃開盡春山晚驛騎還催上玊京送姑蘇權中上人回江隂禪香寺二首深省楓橋半夜鐘禪香得業早心空無端踏遍錢湖月又覔新詩送逺公杖錫秋風去住輕諸方解結慣曽經依然舊業歸來好庭樹森森柏子青和黄瀑翁寄弔龔巖翁畫馬詩續補入有序大徳丁未黄瀑翁寄弔龔巖翁畫馬詩因路雲溪過西江訪李鶴田請同賦明年路雲溪回杭瀑翁首出此卷索和章余於巖翁久敬不忘故拭淚次其韻以重存殁之感焉吾聞曹韓之馬筆力相承如有待能使畫師神色改一落人間五百年珍襲如今復誰在髯龔貌得霜雪蹄曹韓無詩不敢齊神龍變化叵易測似聞展卷空中嘶朅來初放行天歩萬里闗河夜飛渡下慚俗馬相驕矜金羈但識西湖路猛氣尚欲超滹沱春風苜蓿生意多匡廬老仙得此畫迸淚激越成悲歌歌成惆悵翁仙去價直千金那忍顧殷勤寫挂墳樹枝不知㝠漠能知不送陳渭叟之涇縣崇𤣥觀主席葛翁川上一道士形臞貌古神仙似手持九節瘦竹笻來覔籌峰計然子計然仙去白雲深又束琴書㝷舊林武林城中訪親故鶯啼燕語㝷春􅇀小将詩酒送平生煙雨西湖掉頭去有才還接謝宣城羣仙已草新宫銘紫府真官儼環珮鏗金戞玊相逢迎昔年東海釣鼇客白眼看人九州窄涇谿山水天下竒到今勝處多行迹金鼇峰白鷺洲請君放意隨天遊山邊水邊見明月為余問信敬亭秋山行口占一簇人家島嶼煙紛紛兒女閙茶園西峰應有夜來雨添得門前澗水喧和張仲舉書齋詩韻彬彬人物畫圖間一室絃歌白日閑授業儼如承闕里讀書何必向匡山青雲有路君髙歩華髮無成我靦顔看取姓名題雁墖柳條留待贈行攀偶成樓頭疊疊來青山開軒為我一破顔城中合㳫十萬戸奔趍慶弔無時閑老夫七十今踰一誰能對此長戚戚但恨難逢阮歩兵眼底看朱却成碧嵗晚喜友人至之子來何地江山復􅇀冬船明依岸火人靜隔城鐘野俗樽罍古衰年筆硯慵北風吹正急此别欲何從嵗􅇀雪霽書懐雨雪交𤣥隂崢嶸送殘嵗雪霽湖水涸寒風四山至林莽就摧折凍雀聲瑣碎魚蝦不足數快意鳬鷖輩詩翁骨肉瘦坐久白髮脆老竹垂寒姿小草足生意大哉乾坤中萬物自榮悴物理固莫奪慨慷激心志嘗聞是為非復見非為是不如飽煨芋一覺和衣睡山居即事茅齋低小山意深琴書老罷驚流隂食貧不愧乞米帖才薄喜無諛墓金兩峰隠約煙冉冉古木擁腫春沉沉吟梅處士難復見日􅇀啼猿傷客心龍虎山彭法師禱雨感應六首一夏經秋亢旱災稻苖田上盡枯荄生民莫謾心荼毒真士新從福地來海嶽崇深禱不神宿逢箕畢也難慿道傍暍死嗟何及赤脚徒思可踏氷真士能推濟物仁夜通封事格天臨扶摇九萬誰云逺響荅惟存一寸心載展𤣥旗結晝隂令牌三擊鬼神聽木郎不待商羊舞雨脚浪浪似建瓴雨勢翻空走迅霆萬人回首沸歡聲秋風㑹待登場日比屋炊煙樂太平教行正一闡真風雷令初傳出巽宫一滴天瓢蘇萬物可憐真宰不言功挽趙天錫都事白髮星郎學問精大江南北播芳聲治家道在持心正佐省人稱涖事明萊氏逸妻先易簀徐卿令子已成名緑波春草靈輀去凄斷鄉中父老情挽鄉友徐和甫教諭同里同年值徳鄰南州髙士定前身病懐猶説科名事友誼渾如手足親子姪團欒家有慶膏肓上下藥難神虚堂他日重相過弔影驚心是古人湖上春日遣興六言夢覺笙歌聲裏人老湖山畫中花意欲回夜雨詩情不讓春風霞外詩集卷十
