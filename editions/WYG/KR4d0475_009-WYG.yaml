body:
  text: 霞外詩集卷九元馬臻撰西湖春日壯遊即事延祐戊午春偶以釣槎之暇因念西湖春日壯遊尚厯厯然眉睫間光隂幾何余矍鑠矣遂成七言二韻詩三十首以寫幽懐後我之生或不我信儻遺老覽之則將同一興感焉遶湖無處避芳塵疊鼔紅旗彩鷁新冉冉春雲來不斷涌金門外踏青人霍山廟食慶流虹民物謳歌樂嵗豐七寳社回呈了鳥年年歸路雨和風南屏山色染春煙路接髙峰社鼓喧第一橋邊春更好御舟閒在翠芳園問誰偏解占風光飛蓋金鞍白面郎山北山南遊欲遍畫船教艤集賢堂瑞煙祠字隱垂楊士女穿花語笑香三十九賢森翠碣虚舟亭上借傳觴鏤玉雕瓊簇閙竿珠花翠葉縷金籃東家年少貪游冶正值明朝三月三流蘇兩兩挂船頭繡額珠簾不上鉤金縷緩歌家宴靜午前先入裏湖遊紫染春羅窄袖裁伶人楚楚自詼諧部頭教奏金娥曲盡向船棚一字排笙歌簫鼓沸春濤耳目難禁應接勞院落鞦韆誰氏女綵繩擲起過牆髙綺陌遊人隘暖煙去年時節賣餳天隣家兒女歸來晚買得塘魚折柳穿萬柳搖金接畫橋一清堂外景偏饒文章太守開華宴預報龍舟奪錦標歌妓娉婷畫不成去年初籍教坊名新腔翻得梨園譜喜入王孫喝采聲園丁花木巧桮棬萬紫千紅簇綺筵折得青梅小如豆獻來還索賞金錢揉藍染水翠浮山堤上亭臺錦繡間花柳禁人攀折去要留春色大家看進餘薇露與流香散落人間任品嘗處處旗亭招客醉大書不是趕春場珍禽翠羽養雕籠列向船頭盡不同憐殺錦鸚偏解語喚人提挈避東風㶑灔春波鏡面平扁舟賣物往來輕翩翩鷗鷺翻晴雪慣聽笙歌也不驚豪家遊賞占頭船趂得風輕放紙鳶手拍絲綸爭上下一時回首看青天乍暖春衫薄似紗少年三五自讙譁醉眠芳草醒來晚尚覔魚羮向酒家嬌民技藝也天生鬭巧搜竒事事能稚子土宜偏劇戲浪兒黄累十三層一路亭臺間酒家漸看楊柳緑藏鴉太平官府無民訟補種沿堤四季花畫船過午入西林人擁孤山陌上塵曽被弁陽模寫盡晚來閒却半湖春要囑園丁取折枝紅桃白李紫薔薇石函橋畔人煙晚挑得春光一擔歸遙看暝色下漁汀金鴨香消酒半醒倒轉船頭元有意檻邊人報放流星天街夜市已喧闐半掩城門玉漏傳籠燭絳紗爭道入湖心猶有未歸船鞦韆罷蹴綵繩低林館鶯聲白日遲處處荼䕷開似雪不甘便作送春詩桃杏移春㸃碧苔柳綿飛盡小池臺慿君莫信啼鵑語更有花王最後開送得春歸夏又初名園不放玳筵虚只知富足家家事肯為兒孫教讀書誰家乳燕掠船過小小荷錢出水多梅雨乍晴人病酒緑隂天氣正清和慣見升平春復秋分明往事昔年遊西林橋外青山色幾度夕陽人白頭短髮短髮今餘幾浮生一笑􅅓置身名教在造物小兒為司馬猶三好梁鴻謾五噫黄金留買賦不必鑄鍾期秋深村意過雨山光入眼明菊花店舍酒旗新村墟近市魚蝦聚禾黍登場鳥雀馴水驛幾株紅葉樹溪橋數㸃白衣人太平風景真圖畫長愧詩情寫不真嵗􅇀懐友二首積靄迷山意殘冬逼鬢華㟁梅行的皪野竹任交加興盡山隂棹心㝠海上查故人歸未得雨雪正天涯少壯時難再沉憂酒被欺江山容老大嵗月信差池人事忙中盡天機靜裏知存存生意在翻羡石腸兒幽居一徑荒凉長碧苔竹門斜對逺山開自操清白傳家譜不受青黄致木災穴鼠苦銜詩藁去溪螯喜薦酒尊來東籬滿地金錢菊多謝西風為剪裁安分二首分明物物理非殊不足無心望有餘往事百年槐國夢清風千古漆園書畫龍已愧迷真偽抱甕還憐較疾徐滿屋秋聲堪隱几莫驚鐘鼔饗鶢鶋一身慵懶老來添倦汲溪流灌小園昭諫謾愁花解語天隨曽聽鴨能言看雲倚杖知閒極背郭移家為市喧珍重鴟鴞心自得休因腐鼠嚇雛鴛贈漁者湖山青湖水碧白頭漁叟扁舟急山青水碧竟不知賣得魚蝦將米歸沙邊矮屋兒啼飢院落院落閉深靜逍遙情叵同鳥鳴煙淡沲花晚春㝠濛遣理思慮外養真山水中唯當坐永日領此竹窗風暇日偶寫熙晦翁仇山村俾予陋貌髣髴三老坐松石間傳于短縑長不盈尺就成七言詩一首奉寄仰山丈席晦機老子八十餘青瞳烱烱霜眉鬚風幡自動心自如胸中錯落盤經書别時記得吟詩送世事區區等春夢漢無綺皓商山輕越有鴟夷五湖重神遊夜遶梅花洲覺來衣袂清香留賴有白頭仇博士與我聲氣同相求招邀三老成圖畫從渠讚嘆從渠罵不然只作虎溪看他日叢林作佳話悲哉行悲哉白璧埋黄壤富貴熏天一撫掌當年吐氣結成雲如今卧聽松風響蕭翼蘭亭卷治國不求難得貨使民為盗過繇誰松風已閉昭陵土誰料人間出有時為玉岑入侍者賦定巖凝結先天混沌胚亭亭八表任風吹要知心外無巖處不在蒲團宴坐時送僧入定巖回青鎮密印舊業二首玉岑聽徹講時鐘夏滿思歸别意濃想得經房秋色裏薜蘿窗外一重重海珠僧寳絶塵縁正印全提契密傳聞道昭明讀書處水光山色似當年寄題淳安方山長觀雲齋晝長倚檻書眼開一片兩片山中來無心不肻作霖雨轉覺清風生釣臺寄題臞叟徐學正小蘧廬嚴陵灘前山水緑萬古乾坤一茅屋床頭書滿僅容膝晚來無處招雲宿主人養浩心自足繇義居仁慎其獨誰言此室大於斗明月能量千萬斛却喜門無車馬喧秋聲不離窗前竹酬知已自笑謀生拙􅇀年翻百憂古心終不變詩癖死纔休白髮時消息黄金身贅疣感恩非一飯毫髮未能酬挽悦心劉州判二首故家喬木暝煙愁文物衣􅃣不易求授業教尊侯泮日分符老寄浙江州每推詞賦多新語長對湖山憶壯遊杜宇數聲春夢斷可憐心事負盟鷗相看白髮重闗情誰謂先生便隔生池草入吟驚昨夢山花對酌誤春行圖書滿架人何在弓冶承家道自亨五十年來交友意曉風和淚送銘旌贈皇甫秀士止水鑒及微圓月光始揭一方可中庭物象逼騷屑桐江皇甫氏壯嵗盛學業其胄唐詩流未下白傅列源垂百世後亹亹襲芳烈貴賤取諸身索理詣超越麻衣希夷輩聞見亦欣悦勇退難其人此語慎輕説聞仰山丈席熙晦機訃音前年哭松瀑我家顔色薄今年哭晦機禪林慧日落大道甚平夷夫子猶木鐸攢眉聞訃音形聲想如昨驚怪欲狂呌淚下還復閣萬古一死生安用鐵鑄錯縮頸慎勿出門外北風惡簡王仲通明府曽聞宰邑江陵府汎愛民間説到今馴雉自諳絃誦樂飯牛不入利名心青春白日庭堦靜緑幙黄簾雨露深未必伯牙山水意只逢鍾子是知音題常牧溪山水卷髙林衆木秀延眺極秋閣川明宿霧斂巖迥飛淙落弱齡見手畫此士久㝠漠萬里岷峨風空待遼天鶴除夜二首此夕逢除夕春隨綵勝新盤飱寧媚竈斗酒更招鄰柏葉香仍緑燈花笑不嗔定知能報喜未料白頭人竹爆催年換椒香入頌新梅花休笑客燈火故親人詩憶周南化時驚甲子頻老夫無節序盡日懶冠巾雪霽嵗律春仍近寒威老不勝鵲巢擎積雪魚穴凝堅冰賖酒鄰多厭㝷詩檻獨凭逋仙在何處感激涕沾膺題錢舜舉畫竹萌茄蔬圖我茄戀我遣不去飲水曲肱有真意達官日日飽太官笑我出言蔬筍氣錢公寫生髙呉興筆力超詣森有神視此慎勿貴八珍重茵列鼎聞之嗔所謂紫駝峰猩猩唇夢想不到林下人但願一飽安餘齡區區口體之累何足云淨慈西隱祭晦機和尚四時有代謝隂陽隨慘舒萬物具一氣運此環中樞晦機宗門老貌古山澤臞我了三生縁識自壯嵗初融理貫百氏經書何不劬每挹瀟灑志㝠心失憂娛卓錫振叢林挺秀人天模無有入無間百體誰親疎區區過耳事臨風一長吁尚想留别時踏曉㝷吾廬數語發肝肺悠悠戒前途徑仰本一山芹雲隔錢湖秋風兩三至庶得數寄書正為梅花洲足以寧君軀胡為擺世故遺此載神車造化未形我濩落無所居我形忽已化還與造化俱范張未達道錯認生死殊但念平生意復惜流年徂惟予困白首寒巖一枯株既無枝葉累不受春吹嘘感愴謁西隱南屏峙層虚合爪一瓣香隨分營伊蒲冬交雨雪集魂兮歸來乎松菊固無恙入眼皆真如詩成流中腸覼縷不暇拘奠罷出門去野日低寒蕪悲風為我起躊躇重躊躇讀唐僧詩髙僧吟興苦吹萬各秋聲著物鬼難測為容人盡驚力回千古意氣逼五言城輸與無心者輕輕道得成題唐十八學士圖唐家天子登黄屋大業隆興調玉燭當年十八登瀛仙𢎞文日侍分三六兩京初定四海清君聖臣賢古難續立本圖真亮為讚遂令書府藏諸櫝後有龍眠傳此本禮樂衣冠激流俗自從淪落向人間畫手紛紛互翻覆千年事去君莫問留得青編遣人讀蕭蕭馬耳射東風長安道上春山緑為僧缺上人賦鶴山二首緱嶺春風白日閒上人愛鶴自名山别來莫似遼東客一去千年始一還記得嵩陽松樹髙採花不覺誤翻巢天風萬里飛何處老向山中自結茅謾成四十二首林間把酒山雞舞竹外支笻野鶴隨醉卧落花春不管醒來惟有白雲知松風滿屋散輕濤老圃無心事桔橰曝背簷前趂斜日怒爭梨栗笑兒曹徑曲交加鎖竹隂不教寵辱到林扄心閒莫道渾無事粉落松花汙鶴翎參天楊柳手親栽一院西風户牖開落日尚餘三四尺山平水逺看秋來區區得失付酣歌誰信簞瓢得意多荒逕久無桃李樹不知春事已如何遶籬緑橘間黄橙籬外青山取次横一陣晚風寒霧斂堦前待得月明生九日籬根菊未黄無詩無酒惱秋光偶思巢燕歸飛盡自理枯蒲葺草堂溪蟹初肥濁酒香村南村北稻登場白頭羡殺田翁樂醉向茅簷卧夕陽小春天氣未生寒綴樹朱􅟝正入看昨夜海棠開數朶一雙蝴蝶上闌干新霜尚薄樹聲乾寒水無痕倒浸山知是釣船歸較晚鵁鶄嘠嘠起蘆灣飽霜紫芋細凝酥旋撥寒灰出地爐慚愧隣家新酒熟客來沽得滿葫蘆野花芳草三春夢楚水呉山兩地愁心緒晚來禁不得半身斜日倚江樓曽向山中靜結廬雲邊煮藥自樵蘇不知白鶴巢松樹占得門前第幾株世態爭趨向背機眼看朱碧漸成非山桃野杏春猶淺早有青蟲化蝶飛蕭蕭野老髮垂肩家住湖西杜若煙載得茭根入城賣西風落日滿歸船草木凄凉露未晞秋蟲琴瑟漸聲低竹窗夢覺湖光白月在鄰家釣艇西風琴流響韻虚堂湘簟欹眠水一方靜裏數聲棋剥琢乳鶯深向緑隂藏眼底紛紛五色迷楚人元不重山雞老夫驚覺槐隂夢悟得南華物理齊槐柳交隂日正長荷花荷葉滿回塘人間未必渾無暑心地清凉暑自忘老圃秋光亦可佳淡煙凉月自生涯儘容詩酒酬清事丹桂纔開第二花珠絡楂橙滿閣垂欣欣節物暖爐時膽瓶小巧偏堪愛插得檀梅一兩枝長憶成人總角年學吟終夜不成眠精神消盡今頭白秪得詩名不用錢夜雨膏濃曉又晴熙熙景物象升平啼鶯只在花開處誰識桑中布榖情槐隂滿院喧巢鴉蜜房香老蜂趂衙鄰家艇子釣魚去水光搖動金蓮花移榻松隂避月明天河萬里度流星仙遊夢覺蒼華冷猶聽鶴聲來杳㝠西風吹雨十分凉店舍新篘拍甕香淨洗瓦盆刪菊本老夫作意做重陽老我何堪樂自全不將造物强桮棬貪眠又過希夷子一夢人間七十年枯蒲風急駭棲禽紙帳燈昏坐擁衾門外霜華如練白不知何處尚鳴砧飯罷迴廊轉數遭不知積雪重林梢自憐迂僻人多笑洗竹交加助鶴巢勝景園西石路平瘦笻扶我過南屏希夷名在菴何在應是先生睡不醒北風小雨戒新寒隔水楓林葉已丹莫道閑門知己少白鷗飛去又飛還隱隱寒燈竹院深暗風吹雪打窗聲利名不入蒲團夢一衲蒙頭坐到明斜陽日日過山㘭鐘磬相聞隔水敲生事一盂饘粥外靜看林下鵲爭巢燕山楚水曽為客慣聽霜砧搗月明不似新愁怕新鴈秋風吹落兩三聲晴日穿花暖似烘風簷微動玊丁東山童睡起心無事斫得笻枝補鶴籠岸柳禁風葉漸疎乍凉還試夾衣初雨添秋水入籬落閑看鷺鷥行捕魚酒能醉客心雞醉詩解窮人思不窮千古湖山百年事倚闌分付落花風芙蓉露溼天宇清星河淡淡蟾蜍明西村知有夜船過撩亂一羣鸜鵒鳴雲歸雨歇湖水平五色螮蝀山邊明唱歌舟子採菱去十里柳堤蟬亂鳴煙水微茫沒釣磯物情人事兩依依楊花自逐東風去空見漁舟日􅇀歸送客河橋愴别懐露花煙草見船開傷心不及梁間燕又逐春風冒雨來西鄰張樂通宵飲野老耽吟盡日詩總在天機流轉裏可憐樂處不相知村中即事溪流潏決山回縈村歌牧笛亦可聽㟁靜幾枝白菡蓞雨餘無數紅蜻蜓逺林風入自成韻野廟人來時乞靈詩家縛律寫不盡天與萬古開丹青挽周草庭母氏幾生種徳夀期頤早適儒門備母儀追逺不求黄面老送終喜見白頭兒堂萱杳杳承顔日風木蕭蕭陟屺時莫挽靈輀重惆悵已傳書種到孫枝碧山書堂巉巖潤聚洪濛色屹立長空湖海窄翠積松杉重不開昔日曽栖釣鼇客釣鼇客去凌蒼蒼今人此地營書堂桃花流水杳然意為君千載揚芬芳中秋夜偶成紫梨紅棗鬬芳鮮節物闗情亦可憐去住未成為客計隂晴不定看潮天百年林下人空老幾畨天邊月自圓夜倚髙樓逐清景怕他鶴過有神仙緑隂樹色雨餘多芳菲一夢過參天障午日接葉覆官河晝寂碧雲合風薰翠幄羅倦遊思避影况復正清和題虎溪三笑圖無生一曲無人和石池水滿蓮花大揚眉瞬目喜津津不覺回頭虎溪過咄哉三士皆人豪醉醒不理柴桑陶傍人若問笑何事向渠指㸃廬山髙經故人舊居物換人非夢一場世情消盡也思量春風門巷經行處欲倩啼鶯説斷腸為吉上人賦半雲山僧結屋青山麓只有巾瓶伴幽獨分取半間招白雲日􅇀莫教巖際宿挽松江姚守二首皁蓋朱旛事宦游歸來聲價滿杭州民康物阜三年積子貴孫榮幾世修紫禁春濃期入覲玊棺天降已難留呉松父老懐遺徳掩面西風哭故侯占得人間樂事全一門餘慶盡才賢䕃依華胄朝廷重寵錫金章父子聨輪奐落成將佚老瑟琴中斷竟空傳佳城已卜佳山水鬱鬱南屏入翠煙為㑹上人賦百川百川日東流袞袞趨大海異派同一源萬古波不改冷風則帖妥飄風則滂湃善下無不容乃得成其大上人强名號此意亦有在彼來既不息此受非所待安得木𤣥虚作賦訴真宰午節晝永風薰午節臨葵榴此日更精神謀生已分同芻狗厭勝無勞結艾人包黍盃柈遺俗舊浴蘭兒女彩衣新老夫不解追時序靜讀離騷弔楚臣弭楫弭楫望清川寒暉淡將入候暖葉未變天回鴈仍急荒村雞豚瘦夕露煙火溼萬物感徂年軫念追前集脈脈藴言外臨風勉離立和友人韻瘦笻便領鶴糲食任無魚老去詩多拙貧來客自疎嚴陵終獨釣枚乗只安車委命存窮達吾生亦宴如和湛淵白州判見寄弔鶴詩二首養爾山中伴百齡偶因飄瓦便傷生酒闌尚憶梅邊舞月冷空遺操裏聲已斷荘生憂射矢謾傳周穆化巡兵西風一片凄凉意鮑照才髙賦不成頂丹不得駐修齡誤却相期共此生處士今無隨野歩仙人難復致簫聲曽聞弔墓辭陶母偶為乗軒阻衛兵幣褁𤣥黄齎送去華陽真逸已銘成河橋别友短日新霜急􅇀年傷心此别見無縁孤帆自入寒煙去知向何村泊夜船賦童梅巖隱居圖龎公不愛入州府自結衡茅住山塢蒸梨炊黍飽妻兒幽事無人繼前譜梅巖愛山存古心卜築更向青山深區區世事不挂齒晝夜讀書松竹林永讓盧鴻傳十志圖此知君有真意山中之樂何其多白髮心違我應愧和落紅詩韻開謝匆匆本化工曉霞吹散失芳叢可堪長吉心判醉誰悟靈雲色是空鶗鴂自傷三月􅇀詩人錯恨五更風倚闌獨客愁如海夢入回文織錦中題周法師月溪圖氷霜萬里弊貂裘炊熟黄粱認舊游坐看清溪溪上月虚舟不動水悠悠和春晚詩韻一天飛絮草堂低三月風光爛熳為僕老種花迷向背童癡沽酒任醇醨且將白眼􅂓從俗難覔黄金可樂飢傳語東君好歸去今年懶作送春詩霞外詩集卷九
