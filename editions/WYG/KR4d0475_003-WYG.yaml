body:
  text: 霞外詩集卷三元馬臻撰題湘靈鼓瑟沅湘水闊風蕭蕭水風敲珮天光摇為彈寳瑟傳幽愫一㸃柔紅瀉香露蒼梧恨鎖雲欲流湘花背日烘春愁人間有夢到不得仙山翠滑江浪黒雨久江邊餞别别意千重酒暫停放歌一曲向君聽家貧禮數多相失雨久支干盡不靈古巷聚人祠櫟社􅇀潮催客散樟亭孤帆又傍誰家宿遥見沙田燐火青春雨厭聽林鳩喚婦聲楚鄉梅柳一畨春南鄰酒伴無多子細雨斜風故惱人丹井巾子峰頭嶺勢分西湖西畔近西村丹丸化去人通聖山運移來井自存香沁冷光消世味潤滋靈脈破雲根空亭近日無題扁慚愧仙翁幾代孫見柳詠懐畫船曽繫柳邊橋歌舞升平樂意饒事去却憐橋畔柳春來猶學舞兒腰寓意二首原憲古達士被體衣如鶉抱道不茍得舉世誰其珍義士貴結客散金若沙塵富家重桮水不肻延閒人此理古不齊此風難復淳有氣干長虹縮頸不得伸蛙黽誠無知聒聒喧青春列子居鄭圃隱迹四十年自非将適衛詎識斯人賢含淳養天和遂發壺丘言長安豪俠兒寳馬黄金鞭身貴不讀書驕矜耀春妍志士若狥節簞瓢樂其全誰知化囿中䕫蚿謾相憐魚目笑隋珠三復逍遥篇奉簡盛元仁教授三首表表師儒徳業尊青衿弟子盡侯門何當經罷心無事作得新詩細與論湖光山色助幽情琳宇無塵夕照明昨日鄰家聽更好歩虚聲帶讀書聲數株楊柳隔苔磯卜得蕭齋景更稀正是先生讀書處白鷗時復傍簷飛新晴新晴初試夾衣裳梅豆垂青小未甞春色蕩摇鶗鴂恨煙光遮護牡丹香養生不去窗前草得句多題竹外牆心地太平風日好可憐岐路自羊腸即事地瘦仍慳雨桃羞未著花物華欺賤子草色戀貧家呉越山長對乾坤日易斜樓髙不可望春事已聞蛙花信花信頻催景漸和靜看新緑上庭柯夜來幾陣風兼雨添得春流一寸多春隂一嵗春光一半空鶯聲强在雨聲中老來言語渾多忘病起篇章漸不工廣岸霧生沈獨樹平湖日落起寒風無詩無酒花開盡狼籍西園滿地紅題灌畦圗悠悠世道久離淳機械雖多慮轉深野老灌畦甘抱甕可憐端木未知心把酒把酒問春春不知西林逺日生煙霏杜鵑哀怨聲欲死古水流蕩光相依南山北山自朝􅇀今人昔人誰是非千金一笑復何有此心久與鷗忘機移蘭幽蘭雜桃李開花無清香本具巖壑姿庶得韜耿光誤入芳園中乃覺氣不揚少年不我顧志士徒見傷偶值朝雨餘日吉復時良呼童斸春泥移根上髙岡為爾去蕭艾曉露滋瀼瀼永託松竹隂爾生豈不昌細葉舒冷翠貞葩結青陽緩緩趍土脈慎勿近路傍路傍多轍迹曲曲如羊腸恐爾遭採掇委質兒女將哀哉楚靈均細佩荷為裳斯人不可見誰能復其常遂令蘼蕪輩各自爭芬芳回看桃李花零落空啼籹西湖小隱湖外風輕釀薄寒柳隂當戸晝常闗鷗羣不動水紋淡花氣欲流春意閒投老尚餘詩强項遣愁翻被酒孱顔笙歌日夜喧人耳擬卜亂雲生處山蒿里行春風花開春日靜看花少年色相映一朝花謝顔色衰怕見白髮不照鏡苦口勸君君莫哀請看陌上飛塵埃青松白楊過丹旐挽者齊歌蒿里來人生在世無愚智不惜黄金爭意氣黄金用盡意氣消大力不開𤣥室閉君知生死徒離憂我知生死真浮休春風自來還自去野花空笑山頭路贈歌者二首憶曽供奉獨超羣怕問當年樂府名唱到燈詞如有感亂敲檀板却吞聲一聲河滿遏行雲恨逐飛花委路塵莫道樽前無淚下聽歌不是舊時人晴窗晴窗睡起岸巾紗石鼎湯喧小試茶好客不來吟思懶一年辜負海棠花髙樓春望樓髙詩景聚雨霽日華新芳草不知夢杜鵑空怨春寒暄隨節變魚鳥自情親真忝林間客蹉跎老向人倍葛元白仇仁近訪南竺詩僧分韻得影字花開空山春窮幽到絶頂入寺逢逺公頓覺塵慮屏遂作蓮社遊把酒酹龍井萬生各有態得意還自領此樂殊未極落日倒林影明朝下山去笑别風篁嶺夜歸歸杖下山遲喚舟尋渡口霧黒迷逺近篙子不停手湖空菰蒲響脈脈水光走吾廬傍漁燈髣髴認髙柳到家及初更呼童買鄰酒酒酣詩興發明月入窗牖出門看月明中天垂北斗憶春三首斷畦零落薺花明雨過平湖水漸生坐久忽思春去逺緑隂濃淡隱啼鶯晴林紫笋出泥肥又見青梅似彈垂慚愧閒門無一事光隂換得幾聨詩岸柳分隂合小橋杖藜徐歩認鳴蜩山雞來往渾馴熟啄盡闌邊半夏苖自詠四友亡來懶結交芥舟只合置堂坳青溪㸃易知誰識白首探𤣥尚解嘲小景畫成時展玩新詩吟得自推敲閉門不道春將晚驚見殘紅褪杏梢呉中太伯廟茫茫天地裏元氣是貞魂至徳推三讓無稱見獨尊古今時自變尸祝禮常存再拜爐煙晚長歌出廟門栽孤松為九華山鍾道士作九華何崔嵬融結本真宰神器之所鍾雲物足瀟灑挺挺秦大夫獨立而不改既出衆木羣豈為􅃩陽待初疑凍蛟掉秃尾忽若山靈張偃蓋又如𤣥鶴歸來視城郭悵别人間動千載楚南靈椿浪得名茫茫天壤知何在流精貫浹骨欲飛風雨或致雷公怪林林紅紫索價髙幄錦圍春鬬光彩憐君令色不隨時空負才名成感慨留向青山閲古今為問桑田幾滄海覔句覔句不覺晚自吟還自酬因耽五字苦輕惹一生愁水落洲渚出天虚日月浮空持百年意不語對馴鷗靖傳董髙士寄百花詩集雕􅊧元氣萃芳叢未覺唐人詠物工木客聽吟驚夜月花神無語泣春風碧雲影斷遊心處綵筆香生得句中見説草𤣥門巷靜􅇀年事業有誰同月蝕三首夜半蝦䗫蝕月光衆星各自吐毫芒可憐兒女猶知畏擊瓦敲磚閙下方口誦黄庭内外篇堦前再拜􅋹爐煙丹心既切天應鑒不見還光不敢眠喜見還光漸漸盈紫微遙想泰階平癡䗫小伎何堪慮不減乾坤萬古明閑居重九零露綴白曉草根光離離扶笻歩前庭自覺與世遺我本事耘耔肯為好爵縻秋風淒以厲九日忽及兹手把東籬菊口誦淵明詩南山秪南山彼此俱一時俛仰成古今况隔千載期悠悠大方中精氣暫聚之君逺我徒思我思君豈知終然任天運君言不吾欺積雪凍雲晴已散濛密聚觚稜寒日照不化晚風吹更凝空光映書幌勁氣逼吟燈最愛南山寺浮屠白五層鷺雛頂絲未長雪毰毸第一橋邊買得來已覺今朝籠不住見人側腦却相猜除夕白日無停光嵗蛇行赴壑出門眺夕景慨念今非昨舊俗照庭燎餘輝散城郭貧家閉門坐富家自張樂貧富不相侔造物竟何託貧家無忌諱但被愁苦縛富家氣焰髙舉止動成錯山人無一事塊坐甘寂寞青山遶屋頭梅花滿籬落豈無樽中酒可以自斟酌醉卧北窗下此意甚不惡明朝望春來尋詩上江閣和王琴川見寄韻結茅我住西湖濵聞君海内詩有神遂懐昔日謫仙人大笑愚下如沙塵筆驅物色驟回薄隱約松聲轉萬壑壯心忽覺秋氣索抱琴莫負林泉約猶勝讐書天禄閣令威本是遼城鶴喜陳子振至二首兩三年不見詩仙白日追思夜廢眠及至相逢無一事桂花狼籍石池邊憶昔接歡詩酒裏恨君容易上歸船别來若問吟多少潦倒情懐不似前挽葛秀才二首半生門不出居市似居山自負詩書力肯低塵土顔夢回蝴蝶化原冷鶺鴒閒曉雨飛丹旐思君不可攀桑梓彫零盡耆儒獨數君天邊不獻賦地下忽修文恨接笑言晚還悲生死分奠芻空有淚歸洒嶺頭雲吟雪二首桑戸絃歌冷似冰子輿今日更無人莫嫌林下多牢落簷外欹斜一樹春四山削玉水無波冷坐孤吟意􅃐多未必朱門知此味紅爐畫閣正笙歌野歩野色畫難染杖藜春水邊新煙榆木火遲日杏花天村酒傾壺濁溪魚入膾鮮人生行處樂莫負杖頭錢春感書事升平日日事繁華惟恨人生自有涯破曉簾櫳喧燕子新晴巷陌賣桃花酒中賢聖客常滿樂按宫商字不差只有東風舊時柳依前飛絮滿鄰家辨真幻葉公駭真龍裴旻畏真虎舉世不識真大偽滋回互天地假我形起滅為誰故羣幻蔽一真奈何不知顧我心真獨存動觸羣幻怒急流多躁聲層巔無坦歩疇能逆常期巧琢喪純素取實去其華吾當事斯語客思行止皆難定江山信有涯平生不識路垂老始離家人别數聲艣春隨兩㟁花中原多古意吟詠荅年華渡揚子江鯨波撼地紀金焦峙中流神竒裂太古挺挺雙刹浮我行值利渉一葉如閒鷗空光明我心毛骨寒颼颼長揖郭景純明朝渡揚州舟次維揚數幅蒲帆泝急流南風吹送到揚州封侯拜將人何在日照荒城舊驛樓𤓰洲渡書懐二首離家時節正條桑船到𤓰洲麥已黄見説神州好風景自慚無賦獻明光一夜長淮浪拍船惡風疾雨不成眠家書寫得無人寄家在錢塘湖水邊邳州言懐二首戰骨銷沈水氣清沙邊砲石尚縱横不知天定安危計虚使生靈死亂兵昔日旌旗古戍秋將軍曽此覔封侯如今戰地成耕地得見升平任白頭徐州寫望舟人云州有三百六十山四時無草木樊噲墓凡七處莫知孰是三百六十徐州山骨立天風不受寒樊侯古塜七杯土飛沙野蔓斜陽殘舟人指㸃向余説側望淹留寸心切欲酹清樽弔古祠衮衮長河流不歇新州道中風沙渺渺客聨鑣時拂吟鞭慰寂寥車道緑縁酸棗樹野田青蔓苦𤓰苖杜陵老去家何在阮籍愁來氣不驕自笑閒人閒未得得閒終合隱漁樵魯中逺山忽已近近山忽已逺一山復一山使我情繾綣平野莽無人飛沙垢顔臉如何大暑月旅食備艱險古人亦有言富貴非所願休影不息隂望道未之見曷月予還歸飽食故山莧東平道中征途擾擾風沙黄征人下馬坐路傍此邦之人重逺客出門問我來何方笑言酬荅未及已急呼兒女傾壺漿青山堂堂日車轉老樹盤隂杜鵑晚引程驛吏莫漫催我有新詩自排遣感君義氣真可憐回首孤城􅇀煙逺望岳驅車魯東門遥遥望泰山逺勢儼崇大真宰司其間稽首致心語我行良已艱親舍白雲下往轍何時還願言克相之造化終無端汶上即事北闗言别柳飛綿記得離家月又圓華髮流年身半百黄塵疋馬路三千戍兵自褁餱糧送津吏遥迎傳驛眠一夜南風吹汶水古榆深巷已聞蟬過沙河上闕何時到鄉心日夜懸蹇驢車轍路羸馬夕陽天傳驛飢仍逺篙師老不前微茫燈火近沙外有人煙御河阻風篙師飯日午繫舟嬰兒灣大風揚巨浪簸蕩天地間怒聲若驅雷猛勢驚移山得失禀定數真宰炳如丹水宿不及村誰能慘心顔大徳辛丑五月十六日灤都椶殿朝見謹賦絶句三首黄道無塵帳殿深集賢引見羽衣人歩虚奏徹天顔喜萬嵗聲浮玉座春殿中錫宴列諸王羽䙱分班近御床特㫖向前觀妓樂滿身雨露溼天香清曉傳宣入殿門簫韶九奏進金樽教坊齊扮羣仙㑹知是天師朝至尊開平寓舍雨隂六月摧驕陽開平客舍白日長官街汙泥没馬股出門忽似河無梁土風不解重魚鳥東鄰西舍惟烹羊山人肺腑蔬笋氣對此頗覺神不揚昨日樓頭望逺色海霧不動晨光涼青山四面拱城闕龍盤虎踞爭翺翔乃見宸京勢宏大囊括造化吞洪荒惟甘槁木卧林壑豈意野服朝明光太平天子崇道徳繪麗琳宇開清揚列仙縹緲環珮下五里十里聞天香惟皇上帝降百祥煌煌大業垂無疆山人歌詩忽起舞山川草木騰文章山川悠悠望不極白雲飛去之何方故鄉親舍白雲下悵望山川空斷腸何當振翮附黄鵠萬里天風吹渺茫灤都寓興昨夜分明夢到家庭前開遍石榴花龍門不放東風過五月平灤雪滿沙寄舍弟鴈起秋雲白羇棲只恨仍心知貧易變口信逺難憑憶弟愁荀鶴思蓴老季鷹棲遲一盃酒不語對青燈黒山􅇀造黒山頭下馬馬力疲大野無行客僕夫愁渇饑草根積霜露月照光離離王孫喜我至邀我入氊帷琵琶左右動勸我金屈巵此中風俗淳頗似上古時顧慚丘壑姿心迹與世遺際此聖明代厯覽山水竒不學古行役空傷木蘭詩為楊簡齋題空蒙圖西湖天下竒回薄太古色春風散花柳元氣蕩空碧淡然存天真豈為歌舞惑我家本住湖水邊筆床茶竈依漁船振衣一别五千里為君展卷心茫然欲問吾廬在何處但見老木浮寒煙吾廬不可尋山川不可越人生行止㑹有時長嘯堦前望明月開平即事土風渾似古民物自熙熙釀酒收駞乳裁裘聚鼠皮夏寒綿挾舊路滑馬行遲家在千山外思歸未有期得家信舊業今安不天涯我索居闗山萬里使鴻雁幾行書蟻夢秋光薄蟬吟暑氣餘三髙祠下水空憶釣鱸魚灤都旅夜二首不語登髙樓裴回日將夕涼風吹秋來萬葉謝深碧悠悠念逺道坐見山月出下聽城郭中歌笑雜啼泣物理不可窮令人長太息黄鵠垂兩翼徒懐四海心遊子中夜起攬衣歩前庭蕭條行天雲慘淡西風砧客愁結肺腑氣咽不能吟不吟亦不寐厯厯寒更深為疇齋張府卿作樵雲圖喧寂本異軌乃知靜者心清晨整芒屩斧斤入山林擔挑煙霞氣出没窮幽深終南太華長入眼蕭蕭不斷松濤響靜觀天地生化機抱膝無言坐成晚昔日㑹稽朱買臣汲汲行吟背負薪輕將富貴博幽意野風吹老青山春碧桃花底煙光􅇀應見仙人著碁處時清不用歌紫芝獨自穿雲下山去龍門道中八月龍門路冰霜水不波草枯行地鼠風冷過天鵝棧道行車少人家閉户多殷勤䇿羸馬夜宿趂鵰窩驛名李陵臺懐古在昔李將軍提師奮威武歩卒五千人縱横盡貔虎謀猷始欲成管敢摧一語漢恩既未報肝膽日益苦豈知萬里外骨肉膏草莽昭帝固任賢義斷難復取登臺望漢地山川眇如許北風吹不消恨入臺下土我行青山下矯首一懐古復笑秦家城彎環列遺堵惟有山上雲淒迷送秋雨經懐來縣策馬懐來縣明朝始秋節遥看東五臺三峰兩峰雪大野人煙稀穹廬白明滅寒風恐牛馬狐兔號古穴故山丹桂開念此惜𤣥髮寓金臺黄姑菴裏曉鐘聲金水河邊落日情幾許客愁禁不得數莖白髮漸分明得舍弟書木葉蕭蕭下玉闗書來為問幾時還窗前丹桂知無恙湖上白鷗應自閒向氏不勞愁聽笛龎公終是憶居山南中故老如相問莫道如今鬢欲斑寓金臺畫西湖空蒙圖呉雲飛燕山舒卷在所得西湖不在眼客子氣蕭瑟幾夕憑夢歸月暗失阡陌豈若隨天遊疇能縮地脈今朝好晴景木落窗影白潑墨水雲翻幻出空蒙色頓失羇旅愁萬里如不隔何當歸江南展卷畫江北金臺文廟石鼓獵碣鐫功事惘然摩娑壊石卧寒煙昌黎已道文殘缺又較昌黎五百年中秋并序大徳辛丑秋令正中客居金臺崇真道館追思良夜能亡慨然于時逺山亭秋長煙薄晚月行天而流景風散野以傳聲偶賦雜言奉呈松軒太監憶得去年八月十五正黄昏東方擁出黄金盆湖光凝露滴空翠柳隂疎處羅清樽恬然數子文字飲六橋溟涬牽林影一聲何處雄雞鳴月輪已到栖霞嶺共言人世似川流有詩有酒須相酬朋吟醉卧忘爾汝氣吞十里菰蒲秋今年中秋去年月却向燕山照城闕素華摩蕩長庚精萬里清光元不别翻憶西湖看月時飛蓬聚散真難期欲將心事寄歸夢岐路迢迢雲間之雲間之歸夢杳目斷神馳山髙月小興來一夜不成眠還聽雞聲催白曉客中長至日偶成記得去年長至日故園梅蘂正含煙鄰家聚飲分冬酒稚子來需拜節錢已覺鄉愁添繡線還從雲氣卜豐年思歸不為荒三徑九陌黄塵懶著鞭霞外詩集卷三
